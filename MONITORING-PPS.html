    function initPPS() {

        if(!db[k.yr]) db[k.yr] = {}; if(!db[k.yr][k.mn]) db[k.yr][k.mn] = {};
        if(!db[k.yr][k.mn][k.tk]) db[k.yr][k.mn][k.tk] = { target: {1:{},2:{},3:{},4:{}}, harian: {}, kru: "", tipe: "3", reasons: [] };

        switchWeek();

    function getLogic(tgl, it, yr, mn) {
        const dM = new Date(yr, mn, 0).getDate();
        const tglInt = parseInt(tgl) || 1;
        if (it === 'PSM') {
            if (tglInt <= 7) return { wk: 1, dWk: 7 }; if (tglInt <= 15) return { wk: 2, dWk: 8 };
            if (tglInt <= 23) return { wk: 3, dWk: 8 }; return { wk: 4, dWk: dM - 23 };
        } else {
            if (tglInt <= 15) return { wk: 1, dWk: 15 }; return { wk: 3, dWk: dM - 15 };
        }
    }

    function switchWeek() {
        const k = getK(); const wkBaru = document.getElementById('wkTarget').value;
        const tgt = db[k.yr][k.mn][k.tk].target[wkBaru] || {};
        items.forEach(it => { const el = document.getElementById(`t_${it}`); if(el) el.value = tgt[it] || ""; });
        const show = (wkBaru == 1 || wkBaru == 3);
        ['boxPWP','boxSERBA','boxSUGER','boxCEBAN'].forEach(id => document.getElementById(id).style.display = show ? 'block' : 'none');
    }

    function simpanTarget() {
        const k = getK(); const wk = document.getElementById('wkTarget').value;
        if(!k.tk) return alert("Kode Toko Kosong!");
        items.forEach(it => { const el = document.getElementById(`t_${it}`); if(el) db[k.yr][k.mn][k.tk].target[wk][it] = parseFloat(el.value) || 0; });
        saveDisk(); 
        const payload = { toko: k.tk, yr: k.yr, mn: k.mn, wk: wk, targets: db[k.yr][k.mn][k.tk].target[wk], kru: db[k.yr][k.mn][k.tk].kru, tipe: db[k.yr][k.mn][k.tk].tipe, tipeData: "PPS_TARGET" };
        fetch(urlRaportGlobal, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Target Disimpan & Sinkron Cloud! 📊");
    }

    function loadReal() {
        const k = getK(); if(!k.tk) return;
        const tgl = document.getElementById('tglInput').value; 
        const shf = document.getElementById('shfInput').value;
        const ksr = document.getElementById('kasirAktif').value;
        if(!tgl) return; resetBukti();

        const shfKey = shf + "_" + ksr.replace(/\s+/g, '_');
        const hS = db[k.yr][k.mn][k.tk].harian[tgl] || {};
        
        items.forEach(it => { 
            const el = document.getElementById(`r_${it}`); 
            if(el) el.value = (hS[shfKey] && hS[shfKey][it] !== undefined) ? hS[shfKey][it] : ""; 
        });
        
        document.getElementById('noteWA').value = hS[shfKey+'_note'] || "";
        checkTargetStatus();
        cekStatusGembok();
    }

   function checkTargetStatus() {
    const k = getK(); const tgl = parseInt(document.getElementById('tglInput').value); if(!tgl) return false;
    const tipe = parseInt(db[k.yr][k.mn][k.tk].tipe) || 3;
    let failItems = [];

    items.forEach(it => {
        const log = getLogic(tgl, it, k.yr, k.mn);
        const tTotal = parseFloat(db[k.yr][k.mn][k.tk].target[log.wk]?.[it]) || 0;

        if(tTotal > 0) {
            const tS = Math.ceil(tTotal / (log.dWk * tipe));

            if((parseFloat(document.getElementById(`r_${it}`).value) || 0) < tS)
                failItems.push(it.replace('_',' '));
        }
    });

    const lbl = document.getElementById('labelWarning');

    if(failItems.length > 0) {
        lbl.innerText = `⚠️ ITEM [${failItems.join(', ')}] BELUM CAPAI TARGET SHIFT!`;
        lbl.style.display = 'block';
        return true;
    } else {
        lbl.style.display = 'none';
        return false;
    }
}

    function simpanReal() {
        const k = getK(); const tgl = document.getElementById('tglInput').value;
        const ksr = document.getElementById('kasirAktif').value;
        const shf = document.getElementById('shfInput').value;

        if(!tgl || !ksr || ksr === "-- Pilih Kasir --") return alert("Pilih Tanggal & Kasir!");

        const shfKey = shf + "_" + ksr.replace(/\s+/g, '_'); 

        // --- KUNCI 3 JAM ---
        const harianSkrg = db[k.yr]?.[k.mn]?.[k.tk]?.harian?.[tgl] || {};
        const jamTerakhir = harianSkrg[shfKey + '_jam']; 
        const userSesi = JSON.parse(sessionStorage.getItem("userArea")) || {};
        const role = (userSesi.role || "").toLowerCase();

        if (!(role.includes("admin") || role.includes("kepala toko") || role.includes("kt"))) {
            if (jamTerakhir && (new Date().getTime() - jamTerakhir > (3 * 60 * 60 * 1000))) {
                return alert("🚨 DATA TERKUNCI!\nSudah lebih dari 3 jam sejak data pertama disimpan. Hubungi KT untuk perubahan.");
            }
        }

        const note = document.getElementById('noteWA').value.trim(); 
        const waktuSekarang = new Date().getTime(); 

        if(!db[k.yr][k.mn][k.tk].harian[tgl]) db[k.yr][k.mn][k.tk].harian[tgl] = {};
        const hS = db[k.yr][k.mn][k.tk].harian[tgl];
        
        if(!hS[shfKey]) hS[shfKey] = {};
        
        items.forEach(it => { 
            hS[shfKey][it] = parseFloat(document.getElementById(`r_${it}`).value) || 0; 
        });
        
        hS[shfKey+'_nama'] = ksr; 
        hS[shfKey+'_note'] = note;
        hS[shfKey+'_jam'] = waktuSekarang; 
        
        saveDisk();

        const payload = { 
            toko: k.tk, yr: k.yr, mn: k.mn, tgl: tgl, shift: shf, 
            namaPersonil: ksr, note: note, 
            pwp: document.getElementById('r_PWP').value || 0, 
            psm: document.getElementById('r_PSM').value || 0, 
            serba: document.getElementById('r_SERBA_GRATIS').value || 0, 
            suger: document.getElementById('r_SUGER').value || 0, 
            ceban: document.getElementById('r_CEBAN').value || 0, 
            jam: waktuSekarang, 
            tipeData: "PPS_HARIAN_SAVE_V2" 
        };

        fetch(urlRaportGlobal, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("BERHASIL! Data Tersimpan & Sinkron Cloud ✅");
    }

    function updateUI() {
        const k = getK(); if(!k.tk) return;
        const dM = new Date(k.yr, k.mn, 0).getDate();
        let trToko = {PWP:0, PSM:0, SERBA_GRATIS:0, SUGER:0, CEBAN:0}, ttToko = {PWP:0, PSM:0, SERBA_GRATIS:0, SUGER:0, CEBAN:0}, kStats = {}; 
        
        const listKruRaw = document.getElementById('listKru').value.split(',');
        listKruRaw.forEach(n => { 
            if(n.trim()) kStats[n.trim()] = { total:0, w:{1:{R:0,T:0},2:{R:0,T:0},3:{R:0,T:0},4:{R:0,T:0}}, p:{1:{R:0,T:0}, 2:{R:0,T:0}}, items: {PWP:0, PSM:0, SERBA:0, SUGER:0, CEBAN:0} }; 
        });

            items.forEach((it, idx) => {
                const log = getLogic(i, it, k.yr, k.mn); 
                const tH = Math.ceil((db[k.yr][k.mn][k.tk].target[log.wk]?.[it]||0) / log.dWk);
                
                const listKeys = Object.keys(h).filter(key => key.startsWith('s1_') || key.startsWith('s2_') || key.startsWith('s3_'));

            });

                ['s1', 's2', 's3'].forEach(sh => {
                    // Cari data kasir berdasarkan nama di tiap shift
                    const listKeysKru = Object.keys(h).filter(key => key.startsWith(sh + '_') && key.endsWith('_nama'));
                    
                    listKeysKru.forEach(keyNama => {
                        if (h[keyNama] === personil) {
                            const actualKey = keyNama.replace('_nama', '');

                                // HASIL REAL: Tetap dijumlahkan apa adanya

                                if(!kStats[personil].w[log.wk].items) kStats[personil].w[log.wk].items = {};

                               // --- TARGET BULAT KHUSUS (PSM MINGGUAN, LAINNYA PERIODE) ---

                                    kStats[personil].p[i <= 15 ? 1 : 2].T = kStats[personil].w[log.wk].T;
                                } else {
                                    // ITEM LAIN (PWP, SERBA, dll): Tetap Gabungan Mingguan dalam satu Periode
                                    if (i <= 15) {
                                        let tW1 = parseFloat(db[k.yr][k.mn][k.tk].target[1]?.[it]) || 0;
                                        let tW2 = parseFloat(db[k.yr][k.mn][k.tk].target[2]?.[it]) || 0;
                                        kStats[personil].p[1].T = tW1 + tW2;
                                    } else {
                                        let tW3 = parseFloat(db[k.yr][k.mn][k.tk].target[3]?.[it]) || 0;
                                        let tW4 = parseFloat(db[k.yr][k.mn][k.tk].target[4]?.[it]) || 0;
                                        kStats[personil].p[2].T = tW3 + tW4;
                                    }
                                }

            }

            akumTotal += hHari; 
            body.innerHTML += `<tr>${row}<td style="color:${akumTotal>=0?'green':'red'}"><b>${akumTotal}</b></td></tr>`;
        }

function pctVS(real,target){
return target>0
? Math.round((real/target)*100)
: 0;
}

function warnaPctVS(pct){

if(pct>=100){
return "#27ae60";
}

if(pct>=50){
return "#f1c40f";
}

return "#e74c3c";

}

function renderPctVS(real,target){

return `
<span style="
font-weight:bold;
color:${warnaPctVS(pct)};
">
${pct}%

`;

}

function trendVS(sekarang,lalu){

if(lalu<=0){

if(sekarang>0) return "🟢 NEW";

return "⚪ 0%";

}

const pct =
Math.round(
((sekarang-lalu)/lalu)*100
);

if(pct>0)
return `🟢 +${pct}%`;

if(pct<0)
return `🔴 ${pct}%`;

return "⚪ 0%";

}

function pctGrowth(sekarang,lalu){

if(lalu<=0){

if(sekarang>0){
return 999;
}

return 0;

}

return Math.round(
((sekarang-lalu)/lalu)*100
);

}

    function setInputState(bolehEdit, pesan = "") {
        const listID = ['r_PWP', 'r_PSM', 'r_SERBA_GRATIS', 'r_SUGER', 'r_CEBAN', 'noteWA', 'kasirAktif'];
        listID.forEach(id => { const el = document.getElementById(id); if(el) el.disabled = !bolehEdit; });
        const btnWA = document.getElementById('btnWA');
        if(btnWA) { btnWA.style.opacity = bolehEdit ? "1" : "0.5"; btnWA.style.pointerEvents = bolehEdit ? "auto" : "none"; btnWA.innerText = bolehEdit ? "🚀 KIRIM LAPORAN WA" : "🔒 " + pesan + " (HUBUNGI KT)"; }
        const btnSimpan = document.getElementById('btnSimpanShift');
        if(btnSimpan) { btnSimpan.disabled = !bolehEdit; btnSimpan.style.background = bolehEdit ? "#27ae60" : "#95a5a6"; }
    }

    function cekStatusGembok() {
        const k = getK(); const tgl = document.getElementById('tglInput').value; const shfAktif = document.getElementById('shfInput').value;
        const userSesi = JSON.parse(sessionStorage.getItem("userArea")) || {};
        const role = (userSesi.role || "").toLowerCase();
        if (role.includes("admin") || role.includes("kepala toko") || role.includes("kt")) { setInputState(true); return; }
        const harian = db[k.yr]?.[k.mn]?.[k.tk]?.harian[tgl];
        const waktuSimpan = harian ? harian[shfAktif + "_jam"] : null;
        if (waktuSimpan) {
            const selisihMenit = (new Date().getTime() - waktuSimpan) / (1000 * 60);
            if (selisihMenit > 180) { setInputState(false, `SHIFT ${shfAktif.toUpperCase()} TERKUNCI`); } 
            else { setInputState(true); }
        } else { setInputState(true); }
    }

    async function kirimWA() {
    try {
        const k = getK(), tgl = parseInt(document.getElementById('tglInput').value); 
        const shf = document.getElementById('shfInput').value; 
        const ksr = document.getElementById('kasirAktif').value;
        const shfKey = shf + "_" + ksr.replace(/\s+/g, '_');
        const note = document.getElementById('noteWA').value.trim();

        if(!tgl) return alert("Pilih Tanggal!");
        const i1 = document.getElementById('pBuku'), i2 = document.getElementById('pSIS');
        if(!i1.getAttribute('data-loaded') || !i2.getAttribute('data-loaded')) return alert("Upload Foto Dulu!");

        // --- 1. RUMUS TARGET ---
const p = tgl <= 15 ? 1 : 2;
const tipe = parseInt(db[k.yr][k.mn][k.tk].tipe) || 3;
let tTokoBulat = {};
const itm = ['PWP','PSM','SERBA_GRATIS','SUGER','CEBAN'];
const harianSkrg = db[k.yr]?.[k.mn]?.[k.tk]?.harian?.[tgl] || {};

let pDetail = "📊 *HASIL SHIFT INI:*\n";
let adaBebanShift = false;

itm.forEach(it => {

    tTokoBulat[it] = (parseFloat(db[k.yr][k.mn][k.tk].target[p*2-1]?.[it]) || 0) + (parseFloat(db[k.yr][k.mn][k.tk].target[p*2]?.[it]) || 0);

    if(it === 'PSM') {
        const logPSM = getLogic(tgl,'PSM',k.yr,k.mn);
        tTokoBulat[it] = parseFloat(db[k.yr][k.mn][k.tk].target[logPSM.wk]?.PSM) || 0;
    }

    let tS = 0;

    if(it === 'PSM') {
        const logPSM = getLogic(tgl,'PSM',k.yr,k.mn);
        tS = Math.ceil(tTokoBulat[it] / (logPSM.dWk * tipe));
    } else {
        tS = Math.ceil(tTokoBulat[it] / (tipe * (tgl<=15 ? 15 : (new Date(k.yr,k.mn,0).getDate()-15))));
    }

    const rS = parseFloat(harianSkrg[shfKey]?.[it]) || 0;
    const pct = tS > 0 ? (rS/tS)*100 : 0;

    if(rS < tS) adaBebanShift = true;

    pDetail += `🔹 *${it.replace('_',' ')}*
Real: ${rS} / Tgt Shift: ${tS}
${getTextBar(pct)} (${Math.round(pct)}%)

${rS>=tS ? '✅ *LUNAS*' : '🚨 *BEBAN:* '+(tS-rS)+' Pcs'}

`;

});

        // --- 2. KUNCI ALASAN BERULANG ---
        if(adaBebanShift) {
            if(!note) return alert("🚨 TARGET SHIFT TIDAK CAPAI!\nWajib isi kendala/alasan.");
            if(!db[k.yr][k.mn][k.tk].reasons) db[k.yr][k.mn][k.tk].reasons = [];
            let alasanBaru = note.toLowerCase().replace(/\s+/g, ' ');
            if(db[k.yr][k.mn][k.tk].reasons.includes(alasanBaru)) {
                return alert("🚨 ALASAN DITOLAK!\nAlasan '" + note + "' sudah pernah digunakan bulan ini.");
            }
            db[k.yr][k.mn][k.tk].reasons.push(alasanBaru);
        }

        saveDisk();

        // --- 3. HITUNG REKAP ---
        let rekapIndiv = {}, akumulasiToko = {PWP:0, PSM:0, SERBA:0, SUGER:0, CEBAN:0}; 
        const dM = new Date(k.yr, k.mn, 0).getDate();
        for(let i=1; i<=dM; i++){
            const dh = db[k.yr][k.mn][k.tk].harian[i] || {};
            Object.keys(dh).forEach(key => {
                if(key.includes('_nama')){
                    const namaK = dh[key].trim().toUpperCase();
                    const kUtama = key.replace('_nama', '');
                    if(!rekapIndiv[namaK]) rekapIndiv[namaK] = {PWP:0, PSM:0, SERBA:0, SUGER:0, CEBAN:0};
                    let rPWP = parseFloat(dh[kUtama]?.PWP || 0), rPSM = parseFloat(dh[kUtama]?.PSM || 0), rSERBA = parseFloat(dh[kUtama]?.SERBA_GRATIS || 0), rSUGER = parseFloat(dh[kUtama]?.SUGER || 0), rCEBAN = parseFloat(dh[kUtama]?.CEBAN || 0);
                    rekapIndiv[namaK].PWP += rPWP; rekapIndiv[namaK].PSM += rPSM; rekapIndiv[namaK].SERBA += rSERBA; rekapIndiv[namaK].SUGER += rSUGER; rekapIndiv[namaK].CEBAN += rCEBAN;
                    if((p === 1 && i <= 15) || (p === 2 && i > 15)){
                        akumulasiToko.PWP += rPWP; akumulasiToko.PSM += rPSM; akumulasiToko.SERBA += rSERBA; akumulasiToko.SUGER += rSUGER; akumulasiToko.CEBAN += rCEBAN;
                    }
                }
            });
        }

        // --- 4. DASHBOARD TOKO (WARNA) ---
        let dashToko = "🏪 *DASHBOARD TOKO (AKUMULASI):*\n";
        ['PWP','PSM','SERBA','SUGER','CEBAN'].forEach(it => {
            let kR = it === 'SERBA' ? 'SERBA' : it;
            let kT = it === 'SERBA' ? 'SERBA_GRATIS' : it;
            let pctT = tTokoBulat[kT] > 0 ? (akumulasiToko[kR]/tTokoBulat[kT])*100 : 0;
            let emo = pctT < 50 ? "🔴" : (pctT < 100 ? "🟡" : "🟢");
            dashToko += `${emo} ${it}: ${getTextBar(pctT)} ${akumulasiToko[kR]}/${tTokoBulat[kT]} (${Math.round(pctT)}%)\n`;
        });

        // --- 5. KONTRIBUSI PERSONIL (WARNA) ---
        let personilWA = "🏆 *KONTRIBUSI PERSONIL (PERIODE):*\n";
        for (let n in rekapIndiv) {
            personilWA += `👤 *${n}*\n`;
            ['PWP','PSM','SERBA','SUGER','CEBAN'].forEach(it => {
                let rI = rekapIndiv[n][it] || 0;
                let tI = tTokoBulat[it === 'SERBA' ? 'SERBA_GRATIS' : it] || 0;
                let pctI = tI > 0 ? (rI/tI)*100 : 0;
                let emo = pctI < 50 ? "🔴" : (pctI < 100 ? "🟡" : "🟢");
                personilWA += `  ${emo} ${it}: ${getTextBar(pctI)} ${rI}/${tI}\n`;
            });
            personilWA += `\n`;
        }

        const msg = `*MONITORING PPS [${k.tk}]*\n📅 Tgl: ${tgl} ${blnNama[parseInt(k.mn)-1]}\n🕒 Shift: *${shf.toUpperCase()}*\n👤 Kasir: *${ksr}*\n------------------------------------\n${pDetail}📝 *KENDALA/ALASAN:* ${note || '-'}\n\n${dashToko}\n${personilWA}------------------------------------\n🚀 *MANTAP JOSS!*\n*#omkopipait*`;

        // --- 6. GAMBAR ---
        const cnv = document.getElementById('canvasJoin');
        if (cnv) {
            const ctx = cnv.getContext('2d');
            cnv.width=1200; cnv.height=600; ctx.fillStyle="white"; ctx.fillRect(0,0,1200,600);
            ctx.drawImage(i1, 0, 0, 600, 600); ctx.drawImage(i2, 600, 0, 600, 600);
            const link = document.createElement('a'); link.download = `LAPORAN_${k.tk}_TGL${tgl}.jpg`; link.href = cnv.toDataURL("image/jpeg", 0.8);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        alert("SINKRON BERHASIL! ✅🔥");
        setTimeout(() => { window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank'); }, 1000);

    } catch (err) { alert("🚨 ERROR: " + err.message); }
}
