<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PPS MONITORING v34.0 FINAL - #omkopipait</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        /* CSS TETAP SAMA SEPERTI ASLI BAPAK */
        .locked-mode .btn-admin-only { display: none !important; }
        .locked-mode .readonly-date { pointer-events: none !important; background-color: #dddddd !important; color: #888888 !important; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #2c3e50; color: #333; padding: 15px; }
        .container { max-width: 1400px; margin: auto; background: #f4f7f6; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; display: flex; flex-direction: column; }
        h3 { margin-top: 0; color: #8e44ad; font-size: 13px; border-bottom: 2px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 8px; color: #666; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 13px; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-wa { background: #25d366; color: white; border: 2px solid #128c7e; }
        .btn-save { background: #27ae60; color: white; }
        .btn-excel { background: #1f6e43; color: white; border: 2px solid #145a32; margin-top: 5px; }
        .btn-danger { background: #e74c3c; color: white; margin-top: 15px; font-size: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; font-size: 11px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .progress-container { background: #eee; border-radius: 10px; height: 14px; width: 100%; margin-top: 3px; border: 1px solid #ddd; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; transition: width 0.5s ease; }
        .bg-pwp { background: #3498db; } .bg-psm { background: #e67e22; } .bg-serba { background: #2ecc71; } .bg-suger { background: #f1c40f; } .bg-ceban { background: #e74c3c; }
        .warning-label { color: red; font-weight: bold; font-size: 11px; margin-bottom: 5px; display: none; padding: 10px; background: #ffebee; border: 1px solid #ffcdd2; border-radius: 5px; }
        .preview-area { display: flex; gap: 5px; margin-top: 10px; }
        .preview-area img { width: 60px !important; height: 60px !important; object-fit: cover; border: 2px solid #ddd; display: none; border-radius: 5px; }
        .rapor-card { margin-top:10px; border:2px solid #ddd; padding:10px; border-radius:10px; background:#fff; }
        .rapor-table { width: 100%; margin-top: 8px; border-collapse: collapse; font-size: 10px; }
        .rapor-table th { background: #34495e; color: white; padding: 5px; border: 1px solid #ccc; }
        .rapor-table td { padding: 5px; border: 1px solid #ccc; font-weight: bold; }
        #manualWA { display:none; background:#ff9800; color:white; padding:10px; text-align:center; border-radius:5px; margin-top:10px; text-decoration:none; font-weight:bold; font-size:12px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#2c3e50; margin-bottom:20px;">DASHBOARD MONITORING PPS v34.0</h2>
    
    <div class="grid">
        <div class="card">
            <h3>1. SETUP ADMIN & TARGET</h3>
            <div style="display:flex; gap:5px;">
                <select id="thnArsip" onchange="initPPS()"><option value="2026">2026</option></select>
                <select id="blnArsip" onchange="initPPS()"></select>
            </div>
            <input type="text" id="kodeToko" placeholder="KODE TOKO" oninput="initPPS()">
            <label>Tipe Toko</label>
            <select id="tipeToko" onchange="saveTipe()">
                <option value="3">Toko 24 Jam</option>
                <option value="2">Toko Non-24 Jam</option>
            </select>
            <label>Daftar Personil (Pisah Koma)</label>
            <textarea id="listKru" rows="2" oninput="saveKru()"></textarea>
                     
            <div class="btn-admin-only" style="margin-top:10px; padding:10px; background:#f9f9f9; border-radius:8px; border: 1px solid #ddd;">
                <select id="wkTarget" onchange="switchWeek()">
                    <option value="1">Periode 1 (W1-W2)</option>
                    <option value="2">PSM ONLY (W2)</option>
                    <option value="3">Periode 2 (W3-W4)</option>
                    <option value="4">PSM ONLY (W4)</option>
                </select>
                <div id="boxPWP"><label>Target PWP (Pcs)</label><input type="number" id="t_PWP"></div>
                <label>Target PSM (Pcs)</label><input type="number" id="t_PSM">
                <div id="boxSERBA"><label>Target SERBAGRATIS (Pcs)</label><input type="number" id="t_SERBA_GRATIS"></div>
                <div id="boxSUGER"><label>Target SUGER (Pcs)</label><input type="number" id="t_SUGER"></div>
                <div id="boxCEBAN"><label>Target CEBAN (Pcs)</label><input type="number" id="t_CEBAN"></div>
                <button class="btn-save" onclick="simpanTarget()">💾 SIMPAN TARGET</button>
            </div>
            <button class="btn-danger btn-admin-only" onclick="resetSemuaData()">⚠️ RESET SEMUA DATA</button>
        </div>

        <div class="card">
            <h3 style="color:#e67e22;">2. INPUT HASIL SHIFT</h3>
            <label id="labelTglInput">Tanggal Input (BEBAS)</label>
            <input type="number" id="tglInput" placeholder="1-31" min="1" max="31" oninput="loadReal();">
            <label>Kasir Bertugas</label>
            <select id="kasirAktif" onchange="resetBukti()"></select>
            <label>Shift Lapor</label>
            <select id="shfInput" onchange="loadReal();">
                <option value="s3">Shift 3</option>
                <option value="s1" selected>Shift 1</option>
                <option value="s2">Shift 2</option>
            </select>
            <label>Real PWP (Pcs)</label><input type="number" id="r_PWP" oninput="checkTargetStatus()">
            <label>Real PSM (Pcs)</label><input type="number" id="r_PSM" oninput="checkTargetStatus()">
            <label>Real SERBAGRATIS (Pcs)</label><input type="number" id="r_SERBA_GRATIS" oninput="checkTargetStatus()">
            <label>Real SUGER (Pcs)</label><input type="number" id="r_SUGER" oninput="checkTargetStatus()">
            <label>Real CEBAN (Pcs)</label><input type="number" id="r_CEBAN" oninput="checkTargetStatus()">
            <label>📸 Upload 2 Bukti Foto</label>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="file" id="imgBuku" accept="image/*" onchange="previewImg(this, 'pBuku')">
                <input type="file" id="imgSIS" accept="image/*" onchange="previewImg(this, 'pSIS')">
            </div>
            <div class="preview-area">
                <img id="pBuku" src="" alt="Buku Monitoring">
                <img id="pSIS" src="" alt="SIS">
            </div>
            <button id="btnSimpanShift" class="btn-save" onclick="simpanReal()">✅ SIMPAN DATA SHIFT</button>
        </div>

        <div class="card">
            <h3 style="color:#27ae60;">3. ANALISA & BROADCAST</h3>
            <button class="btn-wa" id="btnWA" onclick="kirimWA()">🚀 KIRIM LAPORAN WA</button>
            <div id="labelWarning" class="warning-label"></div>
            <textarea id="noteWA" placeholder="Alasan jika item tidak target..." rows="2" style="margin-top:5px;"></textarea>
            <hr>
            <div id="akumulasiArea"></div>
            <div id="raporArea" style="margin-top:10px; background:#f0f3f4; padding:10px; border-radius:10px; overflow-y: auto; max-height: 400px;"></div>
            <a id="manualWA" target="_blank" href="#">⚠️ WA TIDAK TERBUKA? KLIK SINI</a>
        </div>
    </div>

    <div id="wrapperHarian">
        <h3 style="margin-top:20px; color:#2c3e50;">📊 MONITORING PROGRES HARIAN TOKO</h3>
        <table id="tabelPPS"><thead id="headPPS"></thead><tbody id="bodyPPS"></tbody></table>
    </div>

    <canvas id="canvasJoin"></canvas>

    <div style="text-align: center; margin: 20px 0; padding-bottom: 30px;">
        <a href="index.html" style="background: #f39c12; color: white; padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: inline-block; border: 2px solid #fff;">⬅ KEMBALI KE MENU UTAMA</a>
    </div>
</div>

<script>
    // --- 1. VARIABEL UTAMA (TETAP ASLI) ---
    const items = ['PWP', 'PSM', 'SERBA_GRATIS', 'SUGER', 'CEBAN'];
    const blnNama = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const urlRaportGlobal = "https://script.google.com/macros/s/AKfycbx-SbUWJNnopMWqThRUGLgS1w2RvVG4LyQsTn-bYoWskEmrPvax6qGHhD4bjy9-WFUUIg/exec";
    
    let db = JSON.parse(localStorage.getItem('dbPPS_v30')) || {};

    // --- 2. FUNGSI SISTEM (TETAP ASLI) ---
    function getK() { 
        const thn = document.getElementById('thnArsip')?.value || "2026";
        const bln = document.getElementById('blnArsip')?.value || "1";
        const toko = (document.getElementById('kodeToko')?.value || "").toUpperCase().trim();
        return { yr: thn, mn: bln, tk: toko }; 
    }
    
    function saveDisk() { localStorage.setItem('dbPPS_v30', JSON.stringify(db)); updateUI(); }
    
    function previewImg(input, id) { 
        if (input.files && input.files[0]) { 
            const r = new FileReader(); 
            r.onload = e => { const i = document.getElementById(id); i.src = e.target.result; i.style.display = 'block'; i.setAttribute('data-loaded', 'true'); }; 
            r.readAsDataURL(input.files[0]); 
        } 
    }
    
    function resetBukti() { ['pBuku','pSIS'].forEach(id => { const i = document.getElementById(id); if(i) { i.style.display = 'none'; i.src = ""; i.removeAttribute('data-loaded'); } }); }

    function resetSemuaData() { 
        if (confirm("⚠️ BERSIHKAN DASHBOARD?\n\nIni hanya menghapus tampilan di layar agar bersih. Data asli di Google Drive TETAP AMAN.")) { 
            localStorage.clear(); 
            sessionStorage.clear();
            alert("Dashboard Bersih! Silakan login kembali."); 
            window.location.replace("index.html"); 
            return;
        } 
    }

    // --- 3. WINDOW ONLOAD (TETAP ASLI) ---
    window.onload = function() {
        const b = document.getElementById('blnArsip');
        if (b) {
            b.innerHTML = "";
            blnNama.forEach((n, i) => {
                let sel = (i === new Date().getMonth()) ? 'selected' : '';
                b.innerHTML += `<option value="${i+1}" ${sel}>${n}</option>`;
            });
        }
        const t = document.getElementById('thnArsip');
        if (t) {
            t.innerHTML = `<option value="2025">2025</option><option value="2026" selected>2026</option>`;
        }

        const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
        const hariLogin = localStorage.getItem("lastLoginDate");
        const hariIni = new Date().toDateString();

        if (!userSesi || hariLogin !== hariIni) {
            alert("Sesi berakhir. Silakan login kembali.");
            window.location.href = "index.html"; 
            return;
        } 

        const inToko = document.getElementById("kodeToko");
        if (inToko) { 
            inToko.value = userSesi.toko || ""; 
            if (userSesi.role === "locked") { 
                inToko.readOnly = true; 
                inToko.style.backgroundColor = "#dddddd"; 
            }
        }

        initPPS();
        
        const urlParams = new URLSearchParams(window.location.search);
        const modeLocked = (urlParams.get('mode') === 'locked' || userSesi.role === 'locked');

        if (modeLocked) {
            document.body.classList.add('locked-mode');
            const inputTgl = document.getElementById('tglInput');
            if (inputTgl) {
                inputTgl.value = new Date().getDate(); 
                inputTgl.classList.add('readonly-date'); 
                inputTgl.readOnly = true;
                document.getElementById('labelTglInput').innerHTML = "Tanggal Input <span style='color:red; font-weight:bold;'>[DIKUNCI HARI INI]</span>";
                loadReal();
            }
            
            if(document.getElementById('thnArsip')) document.getElementById('thnArsip').disabled = true;
            if(document.getElementById('blnArsip')) document.getElementById('blnArsip').disabled = true;
            if(document.getElementById('tipeToko')) document.getElementById('tipeToko').disabled = true;
            if(document.getElementById('listKru')) document.getElementById('listKru').readOnly = true;
            if(document.getElementById('wkTarget')) document.getElementById('wkTarget').disabled = true;

            const targets = ['t_PWP', 't_PSM', 't_SERBA_GRATIS', 't_SUGER', 't_CEBAN'];
            targets.forEach(id => { if(document.getElementById(id)) document.getElementById(id).disabled = true; });

            const btnSimpanTgt = document.querySelector('button[onclick="simpanTarget()"]');
            if(btnSimpanTgt) btnSimpanTgt.style.display = 'none';
        }

        pullDataFromCloud();
    };

    // --- 4. FUNGSI KERJA (TETAP ASLI BAPAK) ---
    function initPPS() {
        const k = getK(); if(!k.tk) return;
        if(!db[k.yr]) db[k.yr] = {}; if(!db[k.yr][k.mn]) db[k.yr][k.mn] = {};
        if(!db[k.yr][k.mn][k.tk]) db[k.yr][k.mn][k.tk] = { target: {1:{},2:{},3:{},4:{}}, harian: {}, kru: "", tipe: "3", reasons: [] };
        document.getElementById('listKru').value = db[k.yr][k.mn][k.tk].kru || "";
        document.getElementById('tipeToko').value = db[k.yr][k.mn][k.tk].tipe || "3";
        updateKruList(); switchWeek(); updateUI();
    }

    function updateKruList() {
        const s = document.getElementById('kasirAktif'); const valLama = s.value;
        s.innerHTML = "<option value=''>-- Pilih Kasir --</option>";
        document.getElementById('listKru').value.split(',').forEach(n => { if(n.trim()) s.innerHTML += `<option value="${n.trim()}">${n.trim()}</option>`; });
        s.value = valLama;
    }

    function saveKru() { const k = getK(); if(!k.tk) return; db[k.yr][k.mn][k.tk].kru = document.getElementById('listKru').value; saveDisk(); updateKruList(); }
    function saveTipe() { const k = getK(); if(!k.tk) return; db[k.yr][k.mn][k.tk].tipe = document.getElementById('tipeToko').value; saveDisk(); }

    function getLogic(tgl, it, yr, mn) {
        const dM = new Date(yr, mn, 0).getDate();
        const tglInt = parseInt(tgl) || 1;
        if (it === 'PSM') {
            if (tglInt <= 7) return { wk: 1, dWk: 7 }; if (tglInt <= 15) return { wk: 2, dWk: 8 };
            if (tglInt <= 23) return { wk: 3, dWk: 8 }; return { wk: 4, dWk: dM - 23 };
        } else {
            if (tglInt <= 15) return { wk: 1, dWk: 15 }; return { wk: 3, dWk: dM - 15 };
        }
    }

    function switchWeek() {
        const k = getK(); const wkBaru = document.getElementById('wkTarget').value;
        const tgt = db[k.yr][k.mn][k.tk].target[wkBaru] || {};
        items.forEach(it => { const el = document.getElementById(`t_${it}`); if(el) el.value = tgt[it] || ""; });
        const show = (wkBaru == 1 || wkBaru == 3);
        ['boxPWP','boxSERBA','boxSUGER','boxCEBAN'].forEach(id => document.getElementById(id).style.display = show ? 'block' : 'none');
    }

    function simpanTarget() {
        const k = getK(); const wk = document.getElementById('wkTarget').value;
        if(!k.tk) return alert("Kode Toko Kosong!");
        items.forEach(it => { const el = document.getElementById(`t_${it}`); if(el) db[k.yr][k.mn][k.tk].target[wk][it] = parseFloat(el.value) || 0; });
        saveDisk(); 
        const payload = { toko: k.tk, yr: k.yr, mn: k.mn, wk: wk, targets: db[k.yr][k.mn][k.tk].target[wk], kru: db[k.yr][k.mn][k.tk].kru, tipe: db[k.yr][k.mn][k.tk].tipe, tipeData: "PPS_TARGET" };
        fetch(urlRaportGlobal, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Target Disimpan & Sinkron Cloud! 📊");
    }

    function loadReal() {
        const k = getK(); if(!k.tk) return;
        const tgl = document.getElementById('tglInput').value; 
        const shf = document.getElementById('shfInput').value;
        const ksr = document.getElementById('kasirAktif').value;
        if(!tgl) return; resetBukti();

        const shfKey = shf + "_" + ksr.replace(/\s+/g, '_');
        const hS = db[k.yr][k.mn][k.tk].harian[tgl] || {};
        
        items.forEach(it => { 
            const el = document.getElementById(`r_${it}`); 
            if(el) el.value = (hS[shfKey] && hS[shfKey][it] !== undefined) ? hS[shfKey][it] : ""; 
        });
        
        document.getElementById('noteWA').value = hS[shfKey+'_note'] || "";
        checkTargetStatus();
        cekStatusGembok();
    }

    function checkTargetStatus() {
        const k = getK(); const tgl = parseInt(document.getElementById('tglInput').value); if(!tgl) return false;
        const tipe = parseInt(db[k.yr][k.mn][k.tk].tipe) || 3;
        let failItems = [];
        items.forEach(it => {
            const log = getLogic(tgl, it, k.yr, k.mn); 
            const tTotal = parseFloat(db[k.yr][k.mn][k.tk].target[log.wk]?.[it]) || 0;
            if(tTotal > 0) {
                const tS = Math.ceil(Math.ceil(tTotal / log.dWk) / tipe);
                if((parseFloat(document.getElementById(`r_${it}`).value) || 0) < tS) failItems.push(it.replace('_',' '));
            }
        });
        const lbl = document.getElementById('labelWarning');
        if(failItems.length > 0) { lbl.innerText = `⚠️ ITEM [${failItems.join(', ')}] BELUM CAPAI TARGET SHIFT!`; lbl.style.display = 'block'; return true; } 
        else { lbl.style.display = 'none'; return false; }
    }

    function simpanReal() {
        const k = getK(); const tgl = document.getElementById('tglInput').value;
        const ksr = document.getElementById('kasirAktif').value;
        const shf = document.getElementById('shfInput').value;

        if(!tgl || !ksr || ksr === "-- Pilih Kasir --") return alert("Pilih Tanggal & Kasir!");

        const shfKey = shf + "_" + ksr.replace(/\s+/g, '_'); 

        // --- KUNCI 3 JAM ---
        const harianSkrg = db[k.yr]?.[k.mn]?.[k.tk]?.harian?.[tgl] || {};
        const jamTerakhir = harianSkrg[shfKey + '_jam']; 
        const userSesi = JSON.parse(sessionStorage.getItem("userArea")) || {};
        const role = (userSesi.role || "").toLowerCase();

        if (!(role.includes("admin") || role.includes("kepala toko") || role.includes("kt"))) {
            if (jamTerakhir && (new Date().getTime() - jamTerakhir > (3 * 60 * 60 * 1000))) {
                return alert("🚨 DATA TERKUNCI!\nSudah lebih dari 3 jam sejak data pertama disimpan. Hubungi KT untuk perubahan.");
            }
        }

        const note = document.getElementById('noteWA').value.trim(); 
        const waktuSekarang = new Date().getTime(); 

        if(!db[k.yr][k.mn][k.tk].harian[tgl]) db[k.yr][k.mn][k.tk].harian[tgl] = {};
        const hS = db[k.yr][k.mn][k.tk].harian[tgl];
        
        if(!hS[shfKey]) hS[shfKey] = {};
        
        items.forEach(it => { 
            hS[shfKey][it] = parseFloat(document.getElementById(`r_${it}`).value) || 0; 
        });
        
        hS[shfKey+'_nama'] = ksr; 
        hS[shfKey+'_note'] = note;
        hS[shfKey+'_jam'] = waktuSekarang; 
        
        saveDisk();

        const payload = { 
            toko: k.tk, yr: k.yr, mn: k.mn, tgl: tgl, shift: shf, 
            namaPersonil: ksr, note: note, 
            pwp: document.getElementById('r_PWP').value || 0, 
            psm: document.getElementById('r_PSM').value || 0, 
            serba: document.getElementById('r_SERBA_GRATIS').value || 0, 
            suger: document.getElementById('r_SUGER').value || 0, 
            ceban: document.getElementById('r_CEBAN').value || 0, 
            jam: waktuSekarang, 
            tipeData: "PPS_HARIAN_SAVE_V2" 
        };

        fetch(urlRaportGlobal, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("BERHASIL! Data Tersimpan & Sinkron Cloud ✅");
    }

    function pullDataFromCloud() {
        const k = getK(); if(!k.tk) return;
        fetch(`${urlRaportGlobal}?toko=${k.tk}&yr=${k.yr}&mn=${k.mn}`)
        .then(res => res.json())
        .then(data => {
            if(data && data.target) {
                db[k.yr][k.mn][k.tk].target = data.target;
                db[k.yr][k.mn][k.tk].harian = data.harian || {};
                db[k.yr][k.mn][k.tk].kru = data.kru || db[k.yr][k.mn][k.tk].kru;
                db[k.yr][k.mn][k.tk].tipe = data.tipe || db[k.yr][k.mn][k.tk].tipe;
                localStorage.setItem('dbPPS_v30', JSON.stringify(db));
                document.getElementById('listKru').value = db[k.yr][k.mn][k.tk].kru;
                document.getElementById('tipeToko').value = db[k.yr][k.mn][k.tk].tipe;
                updateKruList(); switchWeek(); updateUI();
            }
        }).catch(e => console.log("Cloud Pull Error"));
    }

    function getTextBar(p) { let pct = Math.round(p) || 0; let filled = Math.min(Math.round(pct/10), 10); return "▓".repeat(filled) + "░".repeat(Math.max(0, 10-filled)) + ` ${pct}%`; }

    function updateUI() {
        const k = getK(); if(!k.tk) return;
        const dM = new Date(k.yr, k.mn, 0).getDate();
        let trToko = {PWP:0, PSM:0, SERBA_GRATIS:0, SUGER:0, CEBAN:0}, ttToko = {PWP:0, PSM:0, SERBA_GRATIS:0, SUGER:0, CEBAN:0}, kStats = {}; 
        
        const listKruRaw = document.getElementById('listKru').value.split(',');
        listKruRaw.forEach(n => { 
            if(n.trim()) kStats[n.trim()] = { total:0, w:{1:{R:0,T:0},2:{R:0,T:0},3:{R:0,T:0},4:{R:0,T:0}}, p:{1:{R:0,T:0}, 2:{R:0,T:0}}, items: {PWP:0, PSM:0, SERBA:0, SUGER:0, CEBAN:0} }; 
        });
        
        const body = document.getElementById('bodyPPS'); 
        if(document.getElementById('headPPS')) document.getElementById('headPPS').innerHTML = `<tr><th>Tgl</th><th>PWP</th><th>PSM</th><th>SERBA</th><th>SUGER</th><th>CEBAN</th><th>+/-</th></tr>`;
        if(!body) return;
        body.innerHTML = ""; let akumTotal = 0; const colors = ['bg-pwp', 'bg-psm', 'bg-serba', 'bg-suger', 'bg-ceban'];

        const harianData = db[k.yr][k.mn][k.tk].harian || {};

        for(let i=1; i<=dM; i++) {
            const h = harianData[i] || {};
            let row = `<td>${i}</td>`, hHari = 0;
            
            items.forEach((it, idx) => {
                const log = getLogic(i, it, k.yr, k.mn);

            });

            for(let personil in kStats) {
                ['s1','s2','s3'].forEach(sh => {
                    const listKeysKru = Object.keys(h).filter(key => key.startsWith(sh + '_') && key.endsWith('_nama'));
                    listKeysKru.forEach(keyNama => {

                            items.forEach(it => {

                                const tipe = parseInt(db[k.yr][k.mn][k.tk].tipe || 3);

                                kStats[personil].p[i <= 15 ? 1 : 2].T += Math.ceil(tH / tipe);

                });
            }

            akumTotal += hHari; 
            body.innerHTML += `<tr>${row}<td style="color:${akumTotal>=0?'green':'red'}"><b>${akumTotal}</b></td></tr>`;
        }

        let akHtml = `<b>📊 AKUMULASI TOKO</b><table class="rapor-table"><tr><th>ITEM</th><th>REAL</th><th>TGT</th><th>%</th></tr>`;

            const p = ttToko[it]>0?(trToko[it]/ttToko[it])*100:0;

        });
        if(document.getElementById('akumulasiArea')) document.getElementById('akumulasiArea').innerHTML = akHtml + "</table>";

        let rHtml = "<b>🏆 ANALISA PERFORMA KASIR</b>";
        for(let n in kStats) {
            rHtml += `<div class="rapor-card" style="border-left:5px solid #8e44ad;">👤 <b>${n}</b><table class="rapor-table"><tr><th>W1</th><th>W2</th><th>W3</th><th>W4</th></tr><tr>`;

        }
        if(document.getElementById('raporArea')) document.getElementById('raporArea').innerHTML = rHtml;
    }

    function setInputState(bolehEdit, pesan = "") {
        const listID = ['r_PWP', 'r_PSM', 'r_SERBA_GRATIS', 'r_SUGER', 'r_CEBAN', 'noteWA', 'kasirAktif'];
        listID.forEach(id => { const el = document.getElementById(id); if(el) el.disabled = !bolehEdit; });
        const btnWA = document.getElementById('btnWA');
        if(btnWA) { btnWA.style.opacity = bolehEdit ? "1" : "0.5"; btnWA.style.pointerEvents = bolehEdit ? "auto" : "none"; btnWA.innerText = bolehEdit ? "🚀 KIRIM LAPORAN WA" : "🔒 " + pesan + " (HUBUNGI KT)"; }
        const btnSimpan = document.getElementById('btnSimpanShift');
        if(btnSimpan) { btnSimpan.disabled = !bolehEdit; btnSimpan.style.background = bolehEdit ? "#27ae60" : "#95a5a6"; }
    }

    function cekStatusGembok() {
        const k = getK(); const tgl = document.getElementById('tglInput').value; const shfAktif = document.getElementById('shfInput').value;
        const userSesi = JSON.parse(sessionStorage.getItem("userArea")) || {};
        const role = (userSesi.role || "").toLowerCase();
        if (role.includes("admin") || role.includes("kepala toko") || role.includes("kt")) { setInputState(true); return; }
        const harian = db[k.yr]?.[k.mn]?.[k.tk]?.harian[tgl];
        const waktuSimpan = harian ? harian[shfAktif + "_jam"] : null;
        if (waktuSimpan) {
            const selisihMenit = (new Date().getTime() - waktuSimpan) / (1000 * 60);
            if (selisihMenit > 180) { setInputState(false, `SHIFT ${shfAktif.toUpperCase()} TERKUNCI`); } 
            else { setInputState(true); }
        } else { setInputState(true); }
    }
