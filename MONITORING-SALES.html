<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Sales Pro v10 - ULTIMATE JOSS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========================================================
           SISTEM TAMPILAN GEMBOK KRU (ASLI - TIDAK DIRUBAH)
           ======================================================== */
        .locked-mode .btn-admin-only { display: none !important; }
        .locked-mode .readonly-date { pointer-events: none !important; background-color: #dddddd !important; color: #888888 !important; }
        .locked-mode input:disabled, .locked-mode select:disabled {
            background-color: #dddddd !important; color: #888888 !important; cursor: not-allowed; border: 1px solid #bbbbbb !important; pointer-events: none;
        }
        #lockMsg { font-weight: bold; font-size: 12px; margin-bottom: 5px; display: block; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2070') no-repeat center center fixed; background-size: cover; color: #333; }
        .container { max-width: 1400px; margin: auto; background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 5px solid #f1c40f; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; position: relative; overflow: hidden; }
        h3 { margin-top: 0; color: #2980b9; font-size: 14px; border-bottom: 2px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #666; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-blue { background: #3498db; color: white; box-shadow: 0 4px #2980b9; }
        .btn-green { background: #27ae60; color: white; box-shadow: 0 4px #1e8449; }
        .btn-wa { background: #25d366; color: white; border: 2px solid #fff; box-shadow: 0 4px #128c7e; }
        button:active { transform: translateY(4px); box-shadow: 0 0px; }
        .badge-s1 { background: #e67e22; color: white; padding: 2px 5px; border-radius: 4px; }
        .badge-s2 { background: #9b59b6; color: white; padding: 2px 5px; border-radius: 4px; }
        .badge-s3 { background: #2c3e50; color: white; padding: 2px 5px; border-radius: 4px; }
        .tag-jsm { font-size: 9px; background: #e74c3c; color: white; padding: 2px 6px; border-radius: 10px; animation: pulse 1s infinite; }
        .tag-jsm-lalu { font-size: 9px; background: #9b59b6; color: white; padding: 2px 6px; border-radius: 10px; }
        .table-box { margin-top: 25px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 11px; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .jsm-row { background: #fff5f5 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .quote-box { background: #fdf9e7; border-left: 5px solid #f1c40f; padding: 10px; margin-top: 15px; font-style: italic; font-size: 11px; color: #7f8c8d; }
    
        /* Styling Pop-up Modal AI */
.modal-ai {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
}
.modal-content {
    background-color: #fff; margin: 5% auto; padding: 25px; border-radius: 15px;
    width: 80%; max-width: 600px; border-top: 8px solid #f1c40f; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}
.close-ai { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
.close-ai:hover { color: #000; }

/* Styling Tabel Shift */
.shift-log-container { margin-top: 15px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
.shift-log-table { width: 100%; min-width: unset; font-size: 10px; }
.shift-log-table th { background: #f8f9fa; color: #333; padding: 5px; }
.shift-log-table td { padding: 5px; border-bottom: 1px solid #eee; }  
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#2c3e50; letter-spacing: 2px;">🚀 MONITORING SALES ULTIMATE 🚀</h2>
        <div id="liveClock" style="font-weight: bold; color: #e67e22;"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>1. HISTORI ACUAN BULAN LALU 📅</h3>
            <label>Kode Toko</label>
            <input type="text" id="kodeToko" placeholder="Contoh: CB09" oninput="loadData()">
            <label>Tipe Operasional Toko</label>
            <select id="tipeToko" onchange="renderAll()">
                <option value="non24">Toko Non 24 Jam (S1 & S2)</option>
                <option value="24jam">Toko 24 Jam (S1, S2, & S3)</option>
            </select>
            <div style="display:flex; gap:5px;">
                <select id="thnLalu" onchange="loadData()"></select>
                <select id="blnLalu" onchange="loadData()"></select>
            </div>
            <label>Total Net Sales Bulan Lalu</label>
            <input type="number" id="totalLalu" oninput="renderAll()">
            <div class="btn-admin-only" style="background:#f0f7ff; padding:10px; border-radius:8px; margin-top:10px; border: 1px dashed #3498db;">
                <label>Input Per Tanggal (BULAN LALU SEMUA)</label>
                <div style="display:flex; gap:5px;"><input type="number" id="tglHistori" placeholder="Tgl"><input type="number" id="valHistori" placeholder="Rp"></div>
                <button class="btn-blue" onclick="simpanLalu()">SIMPAN DATA ACUAN</button>
            </div>
        </div>

        <div class="card" style="border: 2px solid #27ae60;">
            <h3>2. UPDATE REALISASI 💰</h3>
            <label>Target Total Net Sales Bulan Berjalan</label>
            <input type="number" id="targetKini" oninput="renderAll()">
            <hr>
            <div style="display:none; gap:5px;"><select id="thnKini" onchange="loadData()"></select><select id="blnKini" onchange="loadData()"></select></div>
            <label id="labelTglInput">Tanggal Input (Hari Ini: <span id="tglOto"></span>)</label>
            <input type="number" id="inTgl" oninput="cekKunci()">
            <div id="lockMsg" style="font-size:10px; font-weight:bold;"></div>
            <div id="areaShift">
                <div id="rowS3"><label style="font-size:10px;">Sales S3 (Malam)</label><input type="number" id="s3" placeholder="Sales S3" style="border-left: 5px solid #2c3e50;"></div>               
                <div id="rowS1"><label style="font-size:10px; margin-top:5px; display:block;">Sales S1 (Pagi)</label><input type="number" id="s1" placeholder="Sales S1" style="border-left: 5px solid #e67e22;"></div>              
                <div id="rowS2"><label style="font-size:10px; margin-top:5px; display:block;">Sales S2 (Siang)</label><input type="number" id="s2" placeholder="Sales S2" style="border-left: 5px solid #9b59b6;"></div>             
                <label style="color: #27ae60; margin-top: 15px; font-weight:bold;">Target GM % Bulan Ini</label>
                <input type="number" id="tgtGM" placeholder="Target GM %">
                <label style="color: #1e8449; font-weight:bold;">Realisasi GM % Hari Ini</label>
                <input type="number" id="realGM" placeholder="Real GM %">
            </div>
            <button id="btnSave" class="btn-green" onclick="simpanKini()">UPDATE & SIMPAN</button>
            <button class="btn-wa" onclick="kirimWA()">📲 KIRIM LAPORAN WA</button>
        </div>

        <div class="card" style="border: 2px solid #f1c40f;">
    <h3 style="display: flex; justify-content: space-between; align-items: center;">
        3. DASHBOARD VISUAL 📊
        <button onclick="bukaModalAI()" style="width: auto; padding: 4px 10px; margin: 0; font-size: 10px; background: #2980b9; color: white;">🔍 PERBESAR</button>
    </h3>
    <div id="summaryDashboard"></div>
    
    <div class="shift-log-container">
        <table class="shift-log-table">
            <thead>
                <tr><th>Shift</th><th>Realisasi Rp</th><th>Status</th></tr>
            </thead>
            <tbody id="listShiftKini">
                </tbody>
        </table>
    </div>

    <button class="btn-admin-only" onclick="resetDb()" style="background:#eee; color:#999; font-size:9px; box-shadow:none; margin-top:10px;">RESET DATA</button>
</div>

<div id="aiModal" class="modal-ai">
    <div class="modal-content" style="max-width: 750px;">
        <span class="close-ai" onclick="tutupModalAI()">&times;</span>
        <h2 style="color: #2c3e50; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-bottom: 20px;">🤖 AI PERFORMANCE INSIGHT</h2>
        
        <div id="aiAnalysisContent">
            </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p id="aiMotivationalQuote" style="text-align:center; font-style:italic; color:#27ae60; font-weight:bold;"></p>
    </div>
</div>

    <div class="table-box">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2">TGL</th>
                    <th colspan="2">INFO JSM / HARI</th>
                    <th rowspan="2">SALES ACUAN</th>
                    <th rowspan="2">% KONTR.</th>
                    <th rowspan="2">TARGET HARIAN</th>
                    <th rowspan="2">REALISASI SHIFT</th>
                    <th rowspan="2">TOTAL KINI</th>
                    <th rowspan="2">ACCUM +/-</th>
                </tr>
                <tr>
                    <th style="background:#34495e">LALU</th>
                    <th style="background:#34495e">KINI</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div style="text-align: center; margin: 20px 0; padding-bottom: 30px;">
        <a href="index.html" style="background: #f39c12; color: white; padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: inline-block; border: 2px solid #fff;">⬅ KEMBALI KE MENU UTAMA</a>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alfaSalesPaten_v10')) || {};
    const scriptURL = "https://script.google.com/macros/s/AKfycbyb_Bq7X70e29P6PhbtW3Cyc_rsQiauVW9hpgsGCoOuFpEk3Tpu51k5V-DcF9Ct6i4/exec";
    const tglSkrg = new Date().getDate();
    document.getElementById('tglOto').innerText = tglSkrg;

    const qList = ["🔥 Semangat kejar target!", "🚀 Penawaran kunci gacor!", "💪 Tantangan adalah peluang!", "🎯 Tebus murah jos!", "🌟 Awali doa, akhiri bahagia!"];

    const blnNama = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    ['blnLalu','blnKini'].forEach(id => blnNama.forEach((n,i) => { 
        let s = (id==='blnLalu'&&i===(new Date().getMonth()-1))||(id==='blnKini'&&i===new Date().getMonth());
        document.getElementById(id).innerHTML += `<option value="${i+1}" ${s?'selected':''}>${n}</option>`;
    }));
    ['thnLalu','thnKini'].forEach(id => { for(let y=2025;y<=2027;y++) document.getElementById(id).innerHTML += `<option value="${y}" ${y==2026?'selected':''}>${y}</option>`; });

    function cekKunci() {
        let v = parseInt(document.getElementById('inTgl').value);
        let b = document.getElementById('btnSave');
        let m = document.getElementById('lockMsg');
        const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
        const role = userSesi?.role || "locked";
        const t = document.getElementById('kodeToko').value.toUpperCase();
        const yK = document.getElementById('thnKini').value;
        const mK = document.getElementById('blnKini').value;
        const isToday = (v === tglSkrg && mK == (new Date().getMonth() + 1));
        if(role !== "locked" || isToday) {
            if(role === "locked" && db[t]?.[yK]?.[mK]?.lastUpdate?.[v]) {
                let diff = (new Date() - new Date(db[t][yK][mK].lastUpdate[v])) / (1000 * 60 * 60);
                if(diff > 3) { b.disabled = true; b.style.opacity = "0.3"; m.innerHTML = "❌ LOCK (3 JAM)!"; return; }
            }
            b.disabled = false; b.style.opacity = "1"; m.innerText = "✅ OPEN"; m.style.color = "green";
        } else { b.disabled = true; b.style.opacity = "0.3"; m.innerText = "⚠️ LOCK (TGL INI)"; m.style.color = "red"; }
    }

    async function simpanKini() {
    let btn = document.getElementById('btnSave'); 
    btn.disabled = true; btn.innerText = "⌛ SINKRON DRIVE...";

    let t = document.getElementById('kodeToko').value.toUpperCase();
    let tgl = document.getElementById('inTgl').value;
    let yK = document.getElementById('thnKini').value;
    let mK = document.getElementById('blnKini').value;
    let yL = document.getElementById('thnLalu').value;
    let mL = document.getElementById('blnLalu').value;
    
    let targetBulanan = parseFloat(document.getElementById('targetKini').value) || 0;
    let tGM = parseFloat(document.getElementById('tgtGM').value) || 0;
    let rGM = parseFloat(document.getElementById('realGM').value) || 0;

    // Ambil Data Shift
    let inS1 = parseFloat(document.getElementById('s1').value) || 0;
    let inS2 = parseFloat(document.getElementById('s2').value) || 0;
    let inS3 = (document.getElementById('tipeToko').value === "24jam") ? (parseFloat(document.getElementById('s3').value) || 0) : 0;
    let totalHariIni = inS1 + inS2 + inS3;

    // 1. UPDATE DATABASE LOKAL DULU
    if (!db[t]) db[t] = {}; if (!db[t][yK]) db[t][yK] = {}; 
    if (!db[t][yK][mK]) db[t][yK][mK] = { target: 0, harianKini: {}, targetGM: 0 };
    
    db[t][yK][mK].harianKini[tgl] = { s1: inS1, s2: inS2, s3: inS3, total: totalHariIni, gm_persen: rGM };
    db[t][yK][mK].target = targetBulanan;
    db[t][yK][mK].targetGM = tGM;

    // 2. HITUNG ULANG AKUMULASI GAP (MTD) DARI TANGGAL 1 s/d HARI INI
    let dL = db[t][yL]?.[mL] || { totalLalu: 0, harianLalu: {} };
    let accumGapMTD = 0;
    for (let i = 1; i <= tgl; i++) {
        let vL = dL.harianLalu[i] || 0;
        let rK = db[t][yK][mK].harianKini[i] || { total: 0 };
        let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0;
        let tH = Math.round(pL * targetBulanan); // Target Harian
        
        if (rK.total > 0 || i == tgl) {
            accumGapMTD += (rK.total - tH);
        }
    }

    // 3. KIRIM PAYLOAD LENGKAP KE DRIVE (Apps Script)
    let payload = {
        action: "save",
        toko: t,
        type: "KINI",
        key: tgl,
        target: targetBulanan,
        gap: accumGapMTD, // <-- INI ANGKA -5 JUTA TADI, KITA KIRIM HASIL HITUNGAN MTD
        payload: {
            s1: inS1, s2: inS2, s3: inS3,
            total: totalHariIni,
            gm_persen: rGM,
            target_gm: tGM
        }
    };

    try {
        await fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(payload) 
        });
        localStorage.setItem('alfaSalesPaten_v10', JSON.stringify(db));
        renderAll();
        alert("✅ DISIMPAN! Akumulasi MTD: " + accumGapMTD.toLocaleString());
    } catch (e) {
        alert("⚠️ Gagal ke Drive, tapi masuk Web.");
    }
    btn.disabled = false; btn.innerText = "UPDATE & SIMPAN";
}

    function renderAll() {
        let t = document.getElementById('kodeToko').value.toUpperCase(), tb = document.querySelector("#mainTable tbody");
        tb.innerHTML = ""; if (!t || !db[t]) return;
        let yK = document.getElementById('thnKini').value, mK = document.getElementById('blnKini').value, yL = document.getElementById('thnLalu').value, mL = document.getElementById('blnLalu').value;
        let dL = db[t][yL]?.[mL] || {totalLalu:0, harianLalu:{}}, dK = db[t][yK][mK] || {target:0, harianKini:{}};
        let ak = 0, tk = 0, tglIn = parseInt(document.getElementById('inTgl').value) || tglSkrg;
        
        // --- TANDAI: LOGIKA GEMBOK SHIFT 3 ---
        let tipe = document.getElementById('tipeToko').value;
        if (tipe === "non24") {
            document.getElementById('rowS3').style.display = "none";
            document.getElementById('s3').value = 0; // Paksa nol jika bukan 24 jam
        } else {
            document.getElementById('rowS3').style.display = "block";
        }

        // VARIABEL BARU UNTUK HITUNG AKUMULASI GM (MTD)
        let totalSalesMTD = 0;
        let totalGMRpMTD = 0;

        for (let i = 1; i <= 31; i++) {
            let vL = dL.harianLalu[i] || 0, rK = dK.harianKini[i] || {s1:0,s2:0,s3:0,total:0,gm_persen:0};
            let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0, tH = Math.round(pL * dK.target), dtK = new Date(yK, mK - 1, i), dtL = new Date(yL, mL - 1, i);
            if (dtK.getMonth() !== mK - 1) continue;
            
            let hL = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"][dtL.getDay()], hK = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"][dtK.getDay()], jK = [0, 5, 6].includes(dtK.getDay()), jL = [0, 5, 6].includes(dtL.getDay());
            
            // Logika Sales (Tetap)
            ak += (rK.total > 0 ? (rK.total - tH) : 0); 
            tk += rK.total;

            // --- KUNCI: HITUNG SEMUA DATA YANG SUDAH ADA (TGL 1 S/D TERAKHIR INPUT) ---
            if (rK.total > 0) {
                totalSalesMTD += rK.total;
                totalGMRpMTD += (rK.total * (rK.gm_persen / 100));
            }

            tb.innerHTML += `<tr class="${jK ? 'jsm-row' : ''}"><td>${i}</td><td>${hL} ${jL?'<span class="tag-jsm-lalu">JSM</span>':''}</td><td>${hK} ${jK?'<span class="tag-jsm">JSM</span>':''}</td><td>${vL.toLocaleString()}</td><td>${(pL*100).toFixed(2)}%</td><td>${tH.toLocaleString()}</td><td>${rK.total.toLocaleString()}</td><td style="background:#e8f8f5">${rK.total.toLocaleString()}</td><td style="color:${ak>=0?'green':'red'}">${ak.toLocaleString()}</td></tr>`;
        }

        // --- RUMUS DASHBOARD (MTD - MONTH TO DATE) ---
        let aB = dK.target > 0 ? ((tk / dK.target) * 100).toFixed(1) : 0;
        let jmlH = new Date(yK, mK, 0).getDate(), tfP = ((tglSkrg / jmlH) * 100).toFixed(1), gapW = (aB - tfP).toFixed(1);
        
        let tGM = dK.targetGM || 0;
        // Real GM rata-rata dari tgl 1 sampai data terakhir di Drive
        let rGM_MTD = totalSalesMTD > 0 ? (totalGMRpMTD / totalSalesMTD) * 100 : 0;
        let actGMRp_MTD = totalGMRpMTD;
        let tgtGMRp_MTD = totalSalesMTD * (tGM / 100);
        let gapGMRp_MTD = actGMRp_MTD - tgtGMRp_MTD;

        document.getElementById('summaryDashboard').innerHTML = `
            <div style="background:#fff; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;">
                <div style="display:flex; align-items:center; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;">
                    <div style="text-align:center; width:70px;"><svg width="55" height="55" viewBox="0 0 36 36"><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="#eee" stroke-width="3"/><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="${ak>=0?'#27ae60':'#e74c3c'}" stroke-width="3" stroke-dasharray="${aB}, 100"/><text x="18" y="21" text-anchor="middle" font-size="8" font-weight="bold">${aB}%</text></svg><div style="font-size:7px; font-weight:bold; color:#27ae60;">SALES</div></div>
                    <div style="flex-grow:1; padding-left:12px; font-size:10px;"><b>ACT: Rp ${tk.toLocaleString()}</b><br>TGT: Rp ${dK.target.toLocaleString()}<br><span style="color:${ak>=0?'green':'red'}">GAP: Rp ${ak.toLocaleString()}</span></div>
                </div>
                <div style="display:flex; align-items:center; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;">
                    <div style="text-align:center; width:70px;"><svg width="55" height="55" viewBox="0 0 36 36"><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="#eee" stroke-width="3"/><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="${tfP}, 100"/><text x="18" y="21" text-anchor="middle" font-size="8" font-weight="bold">${tfP}%</text></svg><div style="font-size:7px; font-weight:bold; color:#3498db;">WAKTU</div></div>
                    <div style="flex-grow:1; padding-left:12px; font-size:10px;"><b>H-KE ${tglSkrg} DARI ${jmlH}</b><br>SPEED: <span style="color:${(aB-tfP)>=0?'green':'red'}">${(aB-tfP).toFixed(1)}%</span></div>
                </div>
                <div style="display:flex; align-items:center; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;">
                    <div style="text-align:center; width:70px;"><svg width="55" height="55" viewBox="0 0 36 36"><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="#eee" stroke-width="3"/><path d="M18 2 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32" fill="none" stroke="#9b59b6" stroke-width="3" stroke-dasharray="${(rGM_MTD/tGM*100)||0}, 100"/><text x="18" y="21" text-anchor="middle" font-size="7" font-weight="bold">${rGM_MTD.toFixed(2)}%</text></svg><div style="font-size:7px; font-weight:bold; color:#9b59b6;">GM %</div></div>

                    <div style="flex-grow:1; padding-left:12px; font-size:10px;"><b>ACT: Rp ${Math.round(actGMRp_MTD).toLocaleString()}</b><br>TGT MTD: Rp ${Math.round(tgtGMRp_MTD).toLocaleString()}<br><span style="color:${gapGMRp_MTD>=0?'green':'red'}">GAP: Rp ${Math.round(gapGMRp_MTD).toLocaleString()}</span></div>

    async function tarikDataCloud() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        if (!t) return;
        try {
            let res = await fetch(`${scriptURL}?action=get&toko=${t}`);
            let cloudData = await res.json();
            if (cloudData.status === "success") {
                let yK = document.getElementById('thnKini').value, mK = document.getElementById('blnKini').value;
                if (!db[t]) db[t] = {}; if (!db[t][yK]) db[t][yK] = {};
                if (!db[t][yK][mK]) db[t][yK][mK] = { target: 0, harianKini: {}, targetGM: 0 };

                db[t][yK][mK].target = cloudData.data.target || 0;
                db[t][yK][mK].targetGM = cloudData.data.targetGM || 0;

                if (cloudData.data.harianKini) {
                    Object.keys(cloudData.data.harianKini).forEach(tgl => {
                        let dataTgl = cloudData.data.harianKini[tgl];
                        db[t][yK][mK].harianKini[tgl] = {
                            s1: dataTgl.s1 || 0, s2: dataTgl.s2 || 0, s3: dataTgl.s3 || 0,
                            total: dataTgl.total || 0,
                            gm_persen: dataTgl.gm_persen || 0
                        };
                    });
                }
                localStorage.setItem('alfaSalesPaten_v10', JSON.stringify(db));
                document.getElementById('targetKini').value = db[t][yK][mK].target || "";
                document.getElementById('tgtGM').value = db[t][yK][mK].targetGM || "";
                renderAll();
            }
        } catch (e) { console.log("Gagal Sinkron: " + e); }
    }

    window.onload = async function() {
        const ses = JSON.parse(sessionStorage.getItem("userArea"));
        if (!ses) { window.location.href = "index.html"; return; }
        document.getElementById("kodeToko").value = ses.toko;
        
        if (ses.role === "locked") {
            document.body.classList.add('locked-mode');
            document.getElementById('inTgl').value = tglSkrg;
            document.getElementById('inTgl').disabled = true;
            document.getElementById('tgtGM').disabled = true; 
            document.getElementById('tgtGM').style.backgroundColor = "#eee";

            ['targetKini', 'totalLalu', 'tipeToko', 'thnLalu', 'blnLalu'].forEach(id => { 
                let el = document.getElementById(id); if(el) el.disabled = true; 
            });
        }
        await loadData();
    };

    function loadData() {
        let t = document.getElementById('kodeToko').value.toUpperCase(); if(!t) return;
        let yK=document.getElementById('thnKini').value, mK=document.getElementById('blnKini').value;
        if(db[t]?.[yK]?.[mK]) { 
            document.getElementById('targetKini').value=db[t][yK][mK].target||"";
            document.getElementById('tgtGM').value=db[t][yK][mK].targetGM||"";
        }
        renderAll(); 
        tarikDataCloud();
        updateShiftList();
    }

    function kirimWA() {
        const t = document.getElementById('kodeToko').value.toUpperCase();
        const yK = document.getElementById('thnKini').value;
        const mK = document.getElementById('blnKini').value;
        const tglIn = parseInt(document.getElementById('inTgl').value) || tglSkrg;
        const tipe = document.getElementById('tipeToko').value;
        
        // Ambil ID Dropdown Histori Bos
        let yL = document.getElementById('thnLalu').value, mL = document.getElementById('blnLalu').value;
        let dK = db[t]?.[yK]?.[mK] || { target: 0, targetGM: 0, harianKini: {} };
        let dL = db[t]?.[yL]?.[mL] || { totalLalu: 0, harianLalu: {} };

        // --- DATA TARGET & ACUAN LALU ---
        let vL_Now = dL.harianLalu[tglIn] || 0;
        let pL_Now = dL.totalLalu > 0 ? (vL_Now / dL.totalLalu) : 0;
        let tH_Now = Math.round(pL_Now * dK.target);

        // --- REALISASI HARI INI ---
        let d = dK.harianKini[tglIn] || { s1: 0, s2: 0, s3: 0, total: 0, gm_persen: 0 };
        
        // --- HITUNG PERFORMANCE (MTD) ---
        let tsMTD = 0, tgmMTD = 0, jmlH = new Date(yK, mK, 0).getDate();
        Object.keys(dK.harianKini).forEach(tg => { 
            let data = dK.harianKini[tg]; 
            if(data.total > 0){ tsMTD += data.total; tgmMTD += (data.total * (data.gm_persen/100)); }
        });

        let ach = dK.target > 0 ? ((tsMTD / dK.target) * 100).toFixed(1) : 0;
        let tfP = ((tglIn / jmlH) * 100).toFixed(1); 
        let speed = (ach - tfP).toFixed(1);
        let rgmMTD = tsMTD > 0 ? (tgmMTD / tsMTD * 100).toFixed(2) : 0;
        let gapGMRp = Math.round(tgmMTD - (tsMTD * (dK.targetGM/100)));

        // --- KATA-KATA STATUS ---
        let statusSpeed = speed >= 0 ? "🟢 *AMAN (SPEED POSITIF)*" : "🔴 *OVER (SPEED NEGATIF)*";
        let statusGM = gapGMRp >= 0 ? "😇 *NABUNG MARGIN*" : "💀 *HUTANG MARGIN*";
        let sindiran = speed >= 0 ? "Pertahankan! Kasir gass terus jangan kasih kendor!" : "🔥 *KERJA WOY! JANGAN JUALAN BARANG PROMO DOANG!*";

        // --- FORMAT PESAN WA ---
        let pesan = `🚀 *MONITORING SALES [${t}]* 🚀%0A`;
        pesan += `━━━━━━━━━━━━━━━━━━━%0A%0A`;
        
        // --- TAMBAHAN PERBANDINGAN BULAN LALU ---
        pesan += `📅 *INFO KOMPARASI:*%0A`;
        pesan += `• Hari Ini: ${tglIn}/${mK}%0A`;
        pesan += `• *Bulan Lalu: Rp ${vL_Now.toLocaleString()}*%0A`;
        pesan += `• *Target Harian: Rp ${tH_Now.toLocaleString()}*%0A`;
        pesan += `• Kontribusi: ${(pL_Now * 100).toFixed(2)}%25%0A%0A`;

        pesan += `🕒 *REALISASI PER SHIFT:*%0A`;
        if(tipe === "24jam") pesan += `• S3 (Malam): Rp ${d.s3.toLocaleString()}%0A`;
        pesan += `• S1 (Pagi) : Rp ${d.s1.toLocaleString()}%0A`;
        pesan += `• S2 (Siang): Rp ${d.s2.toLocaleString()}%0A`;
        pesan += `• *TOTAL REAL: Rp ${d.total.toLocaleString()}*%0A%0A`;

        pesan += `🏆 *DASHBOARD PERFORMANCE:*%0A`;
        pesan += `• *ACTUAL MTD:* Rp ${tsMTD.toLocaleString()}%0A`;
        pesan += `• *ACHIEVEMENT:* ${ach}%25%0A`;
        pesan += `• *TIME FACTOR:* ${tfP}%25%0A`;
        pesan += `• *SPEED:* ${speed >= 0 ? '📈 +' : '📉 '}${speed}%25%0A`;
        pesan += `• *STATUS:* ${statusSpeed}%0A%0A`;

        pesan += `📈 *PERFORMA GM:*%0A`;
        pesan += `• *REAL GM:* ${rgmMTD}%25 (Tgt: ${dK.targetGM}%25)%0A`;
        pesan += `• *GAP GM:* Rp ${gapGMRp.toLocaleString()}%0A`;
        pesan += `• *KONDISI:* ${statusGM}%0A%0A`;

        pesan += `⚠️ *PESAN UNTUK TEAM:*%0A`;
        pesan += `_${sindiran}_%0A`;
        pesan += `━━━━━━━━━━━━━━━━━━━%0A`;
        pesan += `_Sent via Monitoring Sales App_`;

        window.open(`https://api.whatsapp.com/send?text=${pesan}`, '_blank');
    }
