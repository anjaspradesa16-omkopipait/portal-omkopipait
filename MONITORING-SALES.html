<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Sales Pro v10 - ULTIMATE JOSS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========================================================
           SISTEM TAMPILAN GEMBOK KRU (TIDAK MERUBAH STYLE ASLI)
           ======================================================== */
        .locked-mode .btn-admin-only { 
            display: none !important; 
        }

        /* Gembok tanggal agar abu-abu dan tidak bisa diklik */
        .locked-mode .readonly-date { 
            pointer-events: none !important; 
            background-color: #dddddd !important; 
            color: #888888 !important;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2070') no-repeat center center fixed; background-size: cover; color: #333; }
        .container { max-width: 1400px; margin: auto; background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 5px solid #f1c40f; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; position: relative; overflow: hidden; }
        h3 { margin-top: 0; color: #2980b9; font-size: 14px; border-bottom: 2px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
        label { display: block; font-size: 11px; font-weight: bold; margin-top: 10px; color: #666; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        
        /* Tombol Warna-Warni */
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-blue { background: #3498db; color: white; box-shadow: 0 4px #2980b9; }
        .btn-green { background: #27ae60; color: white; box-shadow: 0 4px #1e8449; }
        .btn-wa { background: #25d366; color: white; border: 2px solid #fff; box-shadow: 0 4px #128c7e; }
        button:active { transform: translateY(4px); box-shadow: 0 0px; }

        /* Progress & Shift Bars */
        .progress-container { background: #ecf0f1; border-radius: 10px; height: 22px; width: 100%; margin: 8px 0; overflow: hidden; position: relative; border: 1px solid #bdc3c7; }
        .progress-bar { background: linear-gradient(90deg, #f1c40f, #2ecc71); height: 100%; width: 0%; transition: 0.8s; }
        .shift-mini-bar { height: 12px; background: #3498db; border-radius: 4px; transition: 0.5s; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; line-height: 22px; color: #2c3e50; }

        /* Badge & Tags */
        .tag-jsm { font-size: 9px; background: #e74c3c; color: white; padding: 2px 6px; border-radius: 10px; animation: pulse 1s infinite; }
        .tag-jsm-lalu { font-size: 9px; background: #9b59b6; color: white; padding: 2px 6px; border-radius: 10px; }
        .badge-s1 { background: #e67e22; color: white; padding: 2px 5px; border-radius: 4px; }
        .badge-s2 { background: #9b59b6; color: white; padding: 2px 5px; border-radius: 4px; }
        .badge-s3 { background: #2c3e50; color: white; padding: 2px 5px; border-radius: 4px; }

        .table-box { margin-top: 25px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 11px; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .jsm-row { background: #fff5f5 !important; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .quote-box { background: #fdf9e7; border-left: 5px solid #f1c40f; padding: 10px; margin-top: 15px; font-style: italic; font-size: 11px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#2c3e50; letter-spacing: 2px;">🚀 MONITORING SALES ULTIMATE 🚀</h2>
        <div id="liveClock" style="font-weight: bold; color: #e67e22;"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>1. HISTORI ACUAN BULAN LALU 📅</h3>
            <label>Kode Toko</label>
            <input type="text" id="kodeToko" placeholder="Contoh: CB09" oninput="loadData()">
            <label>Tipe Operasional Toko</label>
            <select id="tipeToko" onchange="renderAll()">
                <option value="non24">Toko Non 24 Jam (S1 & S2)</option>
                <option value="24jam">Toko 24 Jam (S1, S2, & S3)</option>
            </select>
            <div style="display:flex; gap:5px;">
                <select id="thnLalu" onchange="loadData()"></select>
                <select id="blnLalu" onchange="loadData()"></select>
            </div>
            <label>Total Net Sales Bulan Lalu</label>
            <input type="number" id="totalLalu" oninput="renderAll()">
            <div class="btn-admin-only" style="background:#f0f7ff; padding:10px; border-radius:8px; margin-top:10px; border: 1px dashed #3498db;">
                <label>Input Per Tanggal (BULAN LALU SEMUA)</label>
                <div style="display:flex; gap:5px;"><input type="number" id="tglHistori" placeholder="Tgl"><input type="number" id="valHistori" placeholder="Rp"></div>
                <button class="btn-blue" onclick="simpanLalu()">SIMPAN DATA ACUAN</button>
            </div>
        </div>

        <div class="card" style="border: 2px solid #27ae60;">
            <h3>2. UPDATE REALISASI 💰</h3>
            <label>Target Total Net Sales Bulan Berjalan</label>
            <input type="number" id="targetKini" oninput="renderAll()">
            <hr>
            <div style="display:none; gap:5px;"><select id="thnKini" onchange="loadData()"></select><select id="blnKini" onchange="loadData()"></select></div>
            <label id="labelTglInput">Tanggal Input (Hari Ini: <span id="tglOto"></span>)</label>
            <input type="number" id="inTgl" oninput="cekKunci()">
            <div id="lockMsg" style="font-size:10px; font-weight:bold;"></div>
            <div id="areaShift">
                <input type="number" id="s1" placeholder="Sales S1" style="border-left: 5px solid #e67e22;">
                <input type="number" id="s2" placeholder="Sales S2" style="margin-top:5px; border-left: 5px solid #9b59b6;">
                <input type="number" id="s3" placeholder="Sales S3" style="margin-top:5px; border-left: 5px solid #2c3e50;">
            </div>
            <button id="btnSave" class="btn-green" onclick="simpanKini()">UPDATE & SIMPAN</button>
            <button class="btn-wa" onclick="kirimWA()">📲 KIRIM LAPORAN WA</button>
        </div>

        <div class="card" style="border: 2px solid #f1c40f;">
            <h3>3. DASHBOARD VISUAL 📊</h3>
            <div id="summaryDashboard"></div>
            <div id="shiftVisual" style="margin-top:15px;"></div>
            <div id="quoteDisplay" class="quote-box"></div>
            <button class="btn-admin-only" onclick="resetDb()" style="background:#eee; color:#999; font-size:9px; box-shadow:none;">RESET DATA</button>
        </div>
    </div>

    <div class="table-box">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2">TGL</th>
                    <th colspan="2">INFO JSM / HARI</th>
                    <th rowspan="2">SALES ACUAN</th>
                    <th rowspan="2">% KONTR.</th>
                    <th rowspan="2">TARGET HARIAN</th>
                    <th rowspan="2">REALISASI SHIFT</th>
                    <th rowspan="2">TOTAL KINI</th>
                    <th rowspan="2">ACCUM +/-</th>
                </tr>
                <tr>
                    <th style="background:#34495e">LALU</th>
                    <th style="background:#34495e">KINI</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div style="text-align: center; margin: 20px 0; padding-bottom: 30px;">
        <a href="index.html" style="
            background: #f39c12; 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: inline-block;
            border: 2px solid #fff;
        ">
            ⬅ KEMBALI KE MENU UTAMA
        </a>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alfaSalesPaten_v10')) || {};
    const scriptURL = "https://script.google.com/macros/s/AKfycbx_--RYO4JeZcg47WwNrdNsysSxoNQDwaVm-5QyCJHxr07fgRT_EeAQJzC2ooQajbao/exec";
    let chart; 
    const tglSkrg = new Date().getDate();
    document.getElementById('tglOto').innerText = tglSkrg;

    const qList = [
        "🔥 Kopi pait, jualan manis! Semangat kejar target!",
        "🚀 Pelayanan maksimal adalah kunci struk gacor!",
        "💪 Hutang hari ini adalah tantangan besok. Gaspol!",
        "🎯 Jangan biarkan konsumen pulang tanpa belanja tambahan!",
        "🔥 Tim yang solid membuat target sesulit apapun jadi enteng!",
        "💰 Satu penawaran tebus murah sangat berarti buat achievement!",
        "🌟 Awali shift dengan doa, akhiri dengan laporan bahagia!"
    ];

    const blnNama = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    
    // RENDER FORMAT OPTION TANGGAL & BULAN BAWAAN BAPAK
    ['blnLalu','blnKini'].forEach(id => blnNama.forEach((n,i) => { 
        let s = (id==='blnLalu'&&i===(new Date().getMonth()-1))||(id==='blnKini'&&i===new Date().getMonth());
        document.getElementById(id).innerHTML += `<option value="${i+1}" ${s?'selected':''}>${n}</option>`;
    }));
    ['thnLalu','thnKini'].forEach(id => { for(let y=2025;y<=2027;y++) document.getElementById(id).innerHTML += `<option value="${y}" ${y==2026?'selected':''}>${y}</option>`; });

    function cekKunci() {
        let v = parseInt(document.getElementById('inTgl').value);
        let b = document.getElementById('btnSave');
        let m = document.getElementById('lockMsg');
        
        const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
        const userRole = (userSesi && userSesi.role) ? userSesi.role : "locked";

        if(userRole !== "locked" || (v === tglSkrg && document.getElementById('blnKini').value == (new Date().getMonth()+1))) {
            b.disabled = false; b.style.opacity = "1";
            m.innerText = "✅ AKSES TERBUKA"; m.style.color = "green";
        } else {
            b.disabled = true; b.style.opacity = "0.3";
            m.innerText = "⚠️ TERKUNCI (CREW HANYA BISA TGL HARI INI)"; m.style.color = "red";
        }
    }

    /* ========================================================
       INTEGRASI UTAMA WINDOW.ONLOAD PENGUNCI SALES OMKOPIPAIT
       ======================================================== */
    window.onload = function() {
        // A. Jalankan fungsi penyesuaian visual shift bawaan Bapak
        updateShiftVisibility();

        // B. Tarik data Sesi Login
        const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
        const hariLogin = localStorage.getItem("lastLoginDate");
        const hariIni = new Date().toDateString();

        if (!userSesi || hariLogin !== hariIni) {
            alert("Sesi berakhir. Silakan login kembali.");
            window.location.href = "index.html";
            return;
        } else {
            const inToko = document.getElementById("kodeToko");
            if (inToko) { 
                inToko.value = userSesi.toko; 
                if (userSesi.role === "locked") {
                    inToko.readOnly = true;
                    inToko.style.backgroundColor = "#dddddd";
                } else {
                    inToko.readOnly = false;
                    inToko.style.backgroundColor = "#fff";
                }
            }
        }

        // C. Muat data toko lokal & cloud bawaan Bapak
        loadData();

        // D. Eksekusi Proteksi Hak Akses Berdasarkan Parameter URL Menu Utama
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || userSesi.role; 

        if (mode === 'locked') {
            document.body.classList.add('locked-mode');
            
            const inputTgl = document.getElementById('inTgl');
            if (inputTgl) {
                inputTgl.value = tglSkrg; // Set otomatis ke hari ini
                inputTgl.classList.add('readonly-date');
                inputTgl.readOnly = true;
                
                const labelTgl = document.getElementById('labelTglInput');
                if (labelTgl) labelTgl.innerHTML = "Tanggal Input <span style='color:red; font-weight:bold;'>[DIKUNCI HARI INI]</span>";
            }
            
            // Kunci input acuan administrasi bagi crew store
            const inTargetKini = document.getElementById("targetKini");
            if (inTargetKini) { inTargetKini.readOnly = true; inTargetKini.style.backgroundColor = "#dddddd"; }

            const inTotalLalu = document.getElementById("totalLalu");
            if (inTotalLalu) { inTotalLalu.readOnly = true; inTotalLalu.style.backgroundColor = "#dddddd"; }
            
            console.log("Sistem Terkunci: Akses Crew Store");
        } else {
            console.log("Sistem Terbuka: Akses Kepala Toko");
        }

        // Jalankan validasi tombol simpan di awal
        cekKunci();
    };

    function loadData() {
        let t = document.getElementById('kodeToko').value.toUpperCase(); if(!t) return;
        let yL=document.getElementById('thnLalu').value, mL=document.getElementById('blnLalu').value, yK=document.getElementById('thnKini').value, mK=document.getElementById('blnKini').value;
        if(!db[t]) db[t]={};
        if(!db[t][yL]) db[t][yL]={}; if(!db[t][yL][mL]) db[t][yL][mL]={totalLalu:0,harianLalu:{}};
        if(!db[t][yK]) db[t][yK]={}; if(!db[t][yK][mK]) db[t][yK][mK]={target:0,harianKini:{}};
        document.getElementById('totalLalu').value=db[t][yL][mL].totalLalu||"";
        document.getElementById('targetKini').value=db[t][yK][mK].target||"";
        renderAll();
        tarikDataCloud(); 
    }

    async function tarikDataCloud() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        if(!t) return;

        try {
            let res = await fetch(`${scriptURL}?toko=${t}`);
            let dataCloud = await res.json();
            
            let yK = document.getElementById('thnKini').value;
            let mK = document.getElementById('blnKini').value;

            dataCloud.forEach(item => {
                if(!db[t][yK]) db[t][yK] = {};
                if(!db[t][yK][mK]) db[t][yK][mK] = {target:0, harianKini:{}};

                if (item.tipe === "KINI") {
                    db[t][yK][mK].harianKini[item.key] = item.payload;
                } 
                if (item.tipe === "TARGET") {
                    db[t][yK][mK].target = item.payload.target;
                    document.getElementById('targetKini').value = item.payload.target;
                }
                if (item.tipe === "LALU") {
                    let yL = document.getElementById('thnLalu').value;
                    let mL = document.getElementById('blnLalu').value;
                    if(!db[t][yL]) db[t][yL] = {};
                    if(!db[t][yL][mL]) db[t][yL][mL] = {totalLalu:0, harianLalu:{}};
                    db[t][yL][mL].harianLalu[item.key] = item.payload.val;
                    db[t][yL][mL].totalLalu = item.payload.totalLalu;
                    document.getElementById('totalLalu').value = item.payload.totalLalu;
                }
            });
            renderAll(); 
        } catch (e) {
            console.log("Koneksi cloud sedang sibuk atau data belum ada.");
        }
    }

    function updateShiftVisibility() {
        const tipe = document.getElementById('tipeToko').value;
        const s3 = document.getElementById('s3');
        if(tipe === 'non24') {
            s3.style.display = 'none';
            s3.value = 0; 
        } else {
            s3.style.display = 'block';
        }
    }

    document.getElementById('tipeToko').addEventListener('change', updateShiftVisibility);

    function simpanLalu() {
        let t=document.getElementById('kodeToko').value.toUpperCase(), tgl=document.getElementById('tglHistori').value, val=parseFloat(document.getElementById('valHistori').value);
        if(!t||!tgl||!val) return alert("Data belum lengkap!");
        db[t][document.getElementById('thnLalu').value][document.getElementById('blnLalu').value].harianLalu[tgl]=val;
        db[t][document.getElementById('thnLalu').value][document.getElementById('blnLalu').value].totalLalu=parseFloat(document.getElementById('totalLalu').value);
        save();
    }

    async function simpanKini() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        let tgl = document.getElementById('inTgl').value;
        let s1 = parseFloat(document.getElementById('s1').value) || 0;
        let s2 = parseFloat(document.getElementById('s2').value) || 0;
        let s3 = parseFloat(document.getElementById('s3').value) || 0;
        
        let payload = { s1, s2, s3, total: (s1 + s2 + s3) };

        db[t][document.getElementById('thnKini').value][document.getElementById('blnKini').value].harianKini[tgl] = payload;
        db[t][document.getElementById('thnKini').value][document.getElementById('blnKini').value].target = parseFloat(document.getElementById('targetKini').value);
        save(); 

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({
                    action: "save",
                    toko: t,
                    type: "KINI",
                    key: tgl,
                    payload: payload
                })
            });
            alert("Data Berhasil Diupdate & Sinkron ke Cloud!");
        } catch (e) {
            alert("Tersimpan di HP, gagal kirim ke Cloud. Cek internet!");
        }
    }

    function save() { localStorage.setItem('alfaSalesPaten_v10', JSON.stringify(db)); renderAll(); }

    function renderAll() {
        let t=document.getElementById('kodeToko').value.toUpperCase();
        let tb=document.querySelector("#mainTable tbody"); tb.innerHTML=""; if(!t||!db[t]) return;
        let yL=document.getElementById('thnLalu').value, mL=document.getElementById('blnLalu').value, yK=document.getElementById('thnKini').value, mK=document.getElementById('blnKini').value;
        let dL=db[t][yL][mL], dK=db[t][yK][mK];
        let ak=0, tk=0, ths=0, rhs=0, rS={s1:0,s2:0,s3:0};

        for(let i=1;i<=31;i++){
            let vL=dL.harianLalu[i]||0, rK=dK.harianKini[i]||{s1:0,s2:0,s3:0,total:0};
            let pL=dL.totalLalu>0?(vL/dL.totalLalu):0, tH=Math.round(pL*dK.target);
            let dtL=new Date(yL,mL-1,i), dtK=new Date(yK,mK-1,i); if(dtK.getMonth()!==mK-1) continue;
            let hL=["Min","Sen","Sel","Rab","Kam","Jum","Sab"][dtL.getDay()], hK=["Min","Sen","Sel","Rab","Kam","Jum","Sab"][dtK.getDay()], jK=[0,5,6].includes(dtK.getDay()), jL=[0,5,6].includes(dtL.getDay());
            
            ak+=(rK.total>0?(rK.total-tH):0); tk+=rK.total;
            if(i==tglSkrg){ths=tH;rhs=rK.total; rS=rK;}

            tb.innerHTML+=`<tr class="${jK?'jsm-row':''}">
                <td>${i}</td>
                <td>${hL} ${jL?'<span class="tag-jsm-lalu">JSM</span>':''}</td>
                <td>${hK} ${jK?'<span class="tag-jsm">JSM</span>':''}</td>
                <td>${vL.toLocaleString()}</td>
                <td class="kontribusi-col">${(pL*100).toFixed(2)}%</td>
                <td style="color:#2980b9;font-weight:bold">${tH.toLocaleString()}</td>
                <td><span class="badge-s1">${rK.s1.toLocaleString()}</span> <span class="badge-s2">${rK.s2.toLocaleString()}</span> <span class="badge-s3">${rK.s3.toLocaleString()}</span></td>
                <td style="background:#e8f8f5;font-weight:bold">${rK.total.toLocaleString()}</td>
                <td style="color:${ak>=0?'green':'red'};font-weight:bold">${ak.toLocaleString()}</td>
            </tr>`;
        }

        let aB=dK.target>0?((tk/dK.target)*100).toFixed(2):0, aH=ths>0?((rhs/ths)*100).toFixed(2):0;
        let sisaTarget = dK.target - tk;
        let sisaText = sisaTarget > 0 ? `Sisa: Rp ${sisaTarget.toLocaleString()}` : "🔥 TARGET TEMBUS!";
        let dashColor = ak >= 0 ? '#27ae60' : '#e74c3c'; 

        let htmlDashboard = `
            <div style="display: flex; align-items: center; gap: 10px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom:10px;">
                <svg width="60" height="60" viewBox="0 0 36 36">
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#eee" stroke-width="3"/>
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${dashColor}" stroke-width="3" stroke-dasharray="${Math.min(aB, 100)}, 100" stroke-linecap="round"/>
                    <text x="18" y="21" text-anchor="middle" font-size="8" font-weight="bold" fill="#333">${aB}%</text>
                </svg>
                <div>
                    <div style="font-size:12px; color:${dashColor}; font-weight:900;">${ak >= 0 ? '📈 NABUNG' : '📉 HUTANG'}</div>
                    <div style="font-size:11px; font-weight:bold;">Rp ${Math.abs(ak).toLocaleString()}</div>
                    <div style="font-size:9px; color:#7f8c8d;">${sisaText}</div>
                </div>
            </div>
            <div class="progress-container" style="height:20px; border-radius:10px; position:relative; overflow:hidden; border:1px solid #ccc; background:#eee;">
                <div class="progress-text" style="position:absolute; width:100%; text-align:center; font-size:10px; font-weight:bold; line-height:20px; z-index:2;">Hari Ini: ${aH}%</div>
                <div class="progress-bar" style="width:${Math.min(aH, 100)}%; height:100%; background: linear-gradient(90deg, #f1c40f, ${aH>=100?'#2ecc71':'#e67e22'}); z-index:1;"></div>
            </div>`;
        
        document.getElementById('summaryDashboard').innerHTML = htmlDashboard;

        let maxS = Math.max(rS.s1, rS.s2, rS.s3, 1);
        document.getElementById('shiftVisual').innerHTML = `
            <div style="font-size:10px; font-weight:bold; margin-bottom:5px;">VISUAL SHIFT HARI INI:</div>
            <div style="font-size:9px;">S1: <div class="shift-mini-bar" style="width:${(rS.s1/maxS)*100}%; background:#e67e22;"></div></div>
            <div style="font-size:9px; margin-top:3px;">S2: <div class="shift-mini-bar" style="width:${(rS.s2/maxS)*100}%; background:#9b59b6;"></div></div>
            <div style="font-size:9px; margin-top:3px;">S3: <div class="shift-mini-bar" style="width:${(rS.s3/maxS)*100}%; background:#2c3e50;"></div></div>
        `;
        
        document.getElementById('quoteDisplay').innerText = qList[Math.floor(Math.random()*qList.length)];
    }

    function kirimWA() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        let tgl = document.getElementById('inTgl').value;
        let tipe = document.getElementById('tipeToko').value;
        let yL = document.getElementById('thnLalu').value, mL = document.getElementById('blnLalu').value;
        let yK = document.getElementById('thnKini').value, mK = document.getElementById('blnKini').value;
        
        let dK = db[t][yK][mK];
        let d = dK.harianKini[tgl];
        let dL = db[t][yL][mL];

        if (!d) return alert("Input data dulu untuk tanggal ini!");

        let vL = dL.harianLalu[tgl] || 0;
        let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0;
        let tH = Math.round(pL * dK.target);
        let ach = tH > 0 ? ((d.total / tH) * 100).toFixed(1) : 0;
        
        let hNama = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        let hariLalu = hNama[new Date(yL, mL - 1, tgl).getDay()];
        let hariKini = hNama[new Date(yK, mK - 1, tgl).getDay()];

        let bS1 = tH - d.s3; 
        let bS2 = tH - (d.s3 + d.s1);

        let prog = Math.min(Math.floor(ach / 10), 10);
        let bar = (ach >= 100) ? "🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩" : "🟧".repeat(prog) + "⬜".repeat(10 - prog);

        let pesan = `*🚀 MONITORING SALES [${t}] 🚀*\n` +
                    `-------------------------------------------\n` +
                    `📅 *INFO KOMPARASI*\n` +
                    `• Hari Ini: ${hariKini} (${tgl}/${mK})\n` +
                    `• Bulan Lalu: ${hariLalu} (${tgl}/${mL})\n` +
                    `-------------------------------------------\n\n` +
                    `📊 *ANALISA TARGET*\n` +
                    `• *Target Harian: Rp ${tH.toLocaleString()}*\n` +
                    `• Kontribusi: ${(pL * 100).toFixed(2)}%\n` +
                    `• Sales Bln Lalu: Rp ${vL.toLocaleString()}\n` +
                    `-------------------------------------------\n\n` +
                    `💰 *REALISASI & BEBAN SHIFT*\n`;

        if(tipe === "24jam") {
            pesan += `🌚 *SHIFT 3 (00-08)*\n` +
                     `• Real: Rp ${d.s3.toLocaleString()}\n` +
                     `• *Beban S1:* Rp ${bS1 > 0 ? bS1.toLocaleString() : 'LUNAS ✅'}\n\n`;
        }

        pesan += `🔸 *SHIFT 1 (08-16)*\n` +
                 `• Real: Rp ${d.s1.toLocaleString()}\n` +
                 `• *Beban S2:* Rp ${bS2 > 0 ? bS2.toLocaleString() : 'LUNAS ✅'}\n\n` +
                 `🔹 *SHIFT 2 (16-24)*\n` +
                 `• Real: Rp ${d.s2.toLocaleString()}\n` +
                 `• *Sisa Target:* Rp ${ (tH - d.total) > 0 ? (tH - d.total).toLocaleString() : 'LUNAS ✅'}\n` +
                 `-------------------------------------------\n\n` +
                 `🏆 *HASIL AKHIR TOKO*\n` +
                 `• *TOTAL REAL:* Rp ${d.total.toLocaleString()}\n` +
                 `• *ACHIEVEMENT:* ${ach}%\n` +
                 `${bar}\n` +
                 `-------------------------------------------\n` +
                 `${d.total >= tH ? '🟢 *TARGET JEBOL!* 💪' : '🔴 *KURANG Rp ' + (tH - d.total).toLocaleString() + '*' }\n\n` +
                 `*#omkopipait*`;

        window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    setInterval(() => { let d = new Date(); document.getElementById('liveClock').innerText = d.toLocaleString('id-ID'); }, 1000);
    
    function resetDb() {
        if (confirm("Hapus semua data laporan?")) {
            localStorage.removeItem('alfaSalesPaten_v10'); 
            db = {}; 
            loadData(); 
            document.querySelectorAll('input').forEach(input => input.value = '');
            alert("Data laporan telah dibersihkan!");
        }
    }
</script>
