    <style>

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2070') no-repeat center center fixed; background-size: cover; color: #333; }

        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; line-height: 22px; color: #2c3e50; }

        /* Badge & Tags */
        .tag-jsm { font-size: 9px; background: #e74c3c; color: white; padding: 2px 6px; border-radius: 10px; animation: pulse 1s infinite; }
        .tag-jsm-lalu { font-size: 9px; background: #9b59b6; color: white; padding: 2px 6px; border-radius: 10px; }

        .table-box { margin-top: 25px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 11px; }
        th { background: #2c3e50; color: white; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .quote-box { background: #fdf9e7; border-left: 5px solid #f1c40f; padding: 10px; margin-top: 15px; font-style: italic; font-size: 11px; color: #7f8c8d; }

<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#2c3e50; letter-spacing: 2px;">🚀 MONITORING SALES ULTIMATE 🚀</h2>

        <div class="card" style="border: 2px solid #27ae60;">
            <h3>2. UPDATE REALISASI 💰</h3>
            <label>Target Total Net Sales Bulan Berjalan</label>
            <input type="number" id="targetKini" oninput="renderAll()">
            <hr>
            <div style="display:none; gap:5px;"><select id="thnKini" onchange="loadData()"></select><select id="blnKini" onchange="loadData()"></select></div>
            <label id="labelTglInput">Tanggal Input (Hari Ini: <span id="tglOto"></span>)</label>
            <input type="number" id="inTgl" oninput="cekKunci()">

                <input type="number" id="s2" placeholder="Sales S2" style="margin-top:5px; border-left: 5px solid #9b59b6;">

            <div id="shiftVisual" style="margin-top:15px;"></div>
            <div id="quoteDisplay" class="quote-box"></div>

    <div style="text-align: center; margin: 20px 0; padding-bottom: 30px;">
        <a href="index.html" style="
            background: #f39c12; 
            color: white;

            text-decoration: none;

            font-weight: bold; 
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            border: 2px solid #fff;
        ">
            ⬅ KEMBALI KE MENU UTAMA
        </a>

<script>
    let db = JSON.parse(localStorage.getItem('alfaSalesPaten_v10')) || {};
    const scriptURL = "https://script.google.com/macros/s/AKfycbzYHhYeXFYIpMCTwNaMF0cOZUZZ2EleDSHi6P5uOOsCM-Z59A6l_0nS-0VvHgBh600/exec";
    let chart; 
    const tglSkrg = new Date().getDate();
    document.getElementById('tglOto').innerText = tglSkrg;

    const qList = [
        "🔥 Kopi pait, jualan manis! Semangat kejar target!",
        "🚀 Pelayanan maksimal adalah kunci struk gacor!",
        "💪 Hutang hari ini adalah tantangan besok. Gaspol!",
        "🎯 Jangan biarkan konsumen pulang tanpa belanja tambahan!",
        "🔥 Tim yang solid membuat target sesulit apapun jadi enteng!",
        "💰 Satu penawaran tebus murah sangat berarti buat achievement!",
        "🌟 Awali shift dengan doa, akhiri dengan laporan bahagia!"
    ];

    const blnNama = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    
    ['blnLalu','blnKini'].forEach(id => blnNama.forEach((n,i) => { 
        let s = (id==='blnLalu'&&i===(new Date().getMonth()-1))||(id==='blnKini'&&i===new Date().getMonth());
        document.getElementById(id).innerHTML += `<option value="${i+1}" ${s?'selected':''}>${n}</option>`;
    }));
    ['thnLalu','thnKini'].forEach(id => { for(let y=2025;y<=2027;y++) document.getElementById(id).innerHTML += `<option value="${y}" ${y==2026?'selected':''}>${y}</option>`; });

    // 1. FUNGSI CEK KUNCI - Menangani Hak Akses Crew & Batas Revisi 3 Jam
function cekKunci() {
    let v = parseInt(document.getElementById('inTgl').value);
    let b = document.getElementById('btnSave');
    let m = document.getElementById('lockMsg');
    
    const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
    const userRole = (userSesi && userSesi.role) ? userSesi.role : "locked";
    const t = document.getElementById('kodeToko').value.toUpperCase();
    const yK = document.getElementById('thnKini').value;
    const mK = document.getElementById('blnKini').value;

    // A. CEK APAKAH TANGGAL SESUAI (Crew cuma boleh hari ini)
    const isToday = (v === tglSkrg && mK == (new Date().getMonth() + 1));
    
    if(userRole !== "locked" || isToday) {
        
        // B. LOGIKA PROTEKSI REVISI 3 JAM (KHUSUS CREW)
        if(userRole === "locked" && db[t] && db[t][yK] && db[t][yK][mK] && db[t][yK][mK].lastUpdate && db[t][yK][mK].lastUpdate[v]) {
            let waktuSimpanTerakhir = new Date(db[t][yK][mK].lastUpdate[v]);
            let waktuSekarang = new Date();
            let selisihJam = (waktuSekarang - waktuSimpanTerakhir) / (1000 * 60 * 60);

            if(selisihJam > 3) {
                b.disabled = true;
                b.style.opacity = "0.3";
                b.style.cursor = "not-allowed";
                m.innerHTML = "❌ BATAS REVISI HABIS (Sudah > 3 Jam). HUBUNGI KEPALA TOKO!";
                m.style.color = "red";
                return;
            }
        }

        b.disabled = false; b.style.opacity = "1"; b.style.cursor = "pointer";
        m.innerText = "✅ AKSES TERBUKA"; m.style.color = "green";
    } else {
        b.disabled = true; b.style.opacity = "0.3";
        m.innerText = "⚠️ TERKUNCI (CREW HANYA BISA TGL HARI INI)"; m.style.color = "red";
    }
}

// 3. UPDATE SIMPAN KINI - Agar mencatat waktu input untuk Crew
// ==========================================
// 1. FUNGSI SIMPAN KINI (SUDAH TERHUBUNG KE DRIVE & AMAN DARI CRASH)
// ==========================================
async function simpanKini() {
    let t = document.getElementById('kodeToko').value.toUpperCase();
    let tgl = document.getElementById('inTgl').value;
    let s1 = parseFloat(document.getElementById('s1').value) || 0;
    let s2 = parseFloat(document.getElementById('s2').value) || 0;
    let s3 = parseFloat(document.getElementById('s3').value) || 0;
    let target = parseFloat(document.getElementById('targetKini').value) || 0;
    
    let payload = { s1, s2, s3, total: (s1 + s2 + s3) };

    let yK = document.getElementById('thnKini').value;
    let mK = document.getElementById('blnKini').value;
    
    // PENGAMAN: Pastikan struktur database lokal terbentuk dulu agar tidak crash
    if (!db[t]) db[t] = {};
    if (!db[t][yK]) db[t][yK] = {};
    if (!db[t][yK][mK]) db[t][yK][mK] = { target: 0, harianKini: {} };
    
    // Simpan data utama & target ke lokal
    db[t][yK][mK].harianKini[tgl] = payload;
    db[t][yK][mK].target = target;

    // Simpan Timestamp (Waktu saat ini) untuk proteksi revisi crew 3 jam
    if (!db[t][yK][mK].lastUpdate) db[t][yK][mK].lastUpdate = {};
    db[t][yK][mK].lastUpdate[tgl] = new Date().toISOString();
    
    save(); // Fungsi save & render bawaan asli Anda

    // HITUNG GAP ACCUM SECARA BERJALAN DARI TANGGAL 1
    let yL = document.getElementById('thnLalu').value;
    let mL = document.getElementById('blnLalu').value;
    let dL = db[t][yL]?.[mL] || { totalLalu: 0, harianLalu: {} };
    let dK = db[t][yK][mK];
    let accumGap = 0;

    for (let i = 1; i <= tgl; i++) {
        let vL = dL.harianLalu[i] || 0;
        let rK = dK.harianKini[i] || { total: 0 };
        let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0;
        let tH = Math.round(pL * dK.target);
        accumGap += (rK.total > 0 ? (rK.total - tH) : 0);
    }

    // KIRIM DATA KE GOOGLE DRIVE (SINKRONISASI OTOMATIS)
    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "save",
                toko: t,
                type: "KINI",
                key: tgl,
                payload: payload,
                target: target,
                gap: accumGap
            })
        });
        alert("✅ SHIFT TERKIRIM! Data & GAP sudah meluncur ke Drive.");
    } catch (e) {
        alert("⚠️ Tersimpan di HP, tapi gagal ke Drive. Cek Sinyal!");
    }
    
    cekKunci(); // Cek ulang tombol setelah simpan selesai
}

// ==========================================
// 2. SATU FUNGSI WINDOW.ONLOAD (GABUNGAN SEMUA LOGIKA & AMAN)
// ==========================================
window.onload = async function() {
    // A. Jalankan visibilitas shift default (Toko 24 jam / Non-24 jam)
    updateShiftVisibility();
    
    // B. Proteksi Sesi Login & Masa Berlaku Login Hari Ini
    const userSesi = JSON.parse(sessionStorage.getItem("userArea"));
    const hariLogin = localStorage.getItem("lastLoginDate");
    const hariIni = new Date().toDateString();

    if (!userSesi || hariLogin !== hariIni) {
        alert("Sesi berakhir atau tidak valid. Silakan login kembali.");
        window.location.href = "index.html";
        return;
    }

    // C. Set Nilai Kode Toko Berdasarkan User yang Login
    const inToko = document.getElementById("kodeToko");
    if (inToko) { 
        inToko.value = userSesi.toko; 
        // Jika crew (locked), kode toko tidak boleh diotak-atik
        if (userSesi.role === "locked") {
            inToko.style.pointerEvents = "none";
            inToko.style.backgroundColor = "#dddddd";
            inToko.setAttribute("tabindex", "-1");
        } else {
            inToko.style.pointerEvents = "auto";
            inToko.style.backgroundColor = "#fff";
        }
    }

    // D. Tarik data dari Cloud & render visual dashboard awal
    await loadData(); 

    // E. Handle Kunci Tampilan Jika yang Masuk Adalah Akses Crew (Locked Mode)
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || userSesi.role; 

    if (mode === 'locked') {
        document.body.classList.add('locked-mode');
        
        // Kunci tanggal input agar otomatis stay di hari ini
        const inputTgl = document.getElementById('inTgl');
        if (inputTgl) {
            inputTgl.value = tglSkrg; 
            inputTgl.style.pointerEvents = "none";
            inputTgl.style.backgroundColor = "#eeeeee";
            
            const labelTgl = document.getElementById('labelTglInput');
            if (labelTgl) labelTgl.innerHTML = "Tanggal Input <span style='color:red; font-weight:bold;'>[DIKUNCI HARI INI]</span>";
        }
        
        // Kunci kolom target bulanan dan total bulan lalu agar crew tidak bisa edit angka acuan
        const elementDikunci = ['targetKini', 'totalLalu', 'tipeToko', 'thnLalu', 'blnLalu', 'thnKini', 'blnKini'];
        elementDikunci.forEach(id => {
            let el = document.getElementById(id);
            if (el) {
                el.style.pointerEvents = "none";
                el.style.backgroundColor = "#eeeeee";
                el.style.color = "#444";
                el.setAttribute("tabindex", "-1");
            }
        });
        
        console.log("🔒 Sistem Terkunci: Akses Crew Store Terproteksi");
    } else {
        console.log("🔓 Sistem Terbuka: Akses Kepala Toko / Admin");
    }

    // F. Jalankan hitungan akhir & cek tombol simpan
    if (typeof renderAll === "function") renderAll(); 
    cekKunci();
};

    function loadData() {
        let t = document.getElementById('kodeToko').value.toUpperCase(); 
        
        if(!t) {
            document.getElementById('totalLalu').value = "";
            document.getElementById('targetKini').value = "";
            document.getElementById('s1').value = "";
            document.getElementById('s2').value = "";
            if(document.getElementById('s3')) document.getElementById('s3').value = "";
            renderAll(); 
            return; 
        }

        let yL=document.getElementById('thnLalu').value, mL=document.getElementById('blnLalu').value, yK=document.getElementById('thnKini').value, mK=document.getElementById('blnKini').value;
        if(!db[t]) db[t]={};
        if(!db[t][yL]) db[t][yL]={}; if(!db[t][yL][mL]) db[t][yL][mL]={totalLalu:0,harianLalu:{}};
        if(!db[t][yK]) db[t][yK]={}; if(!db[t][yK][mK]) db[t][yK][mK]={target:0,harianKini:{}};
        
        document.getElementById('totalLalu').value=db[t][yL][mL].totalLalu||"";
        document.getElementById('targetKini').value=db[t][yK][mK].target||"";
        
        renderAll();
        tarikDataCloud(); 
    }

    /* ========================================================
       TAMBAHAN BARU: FUNGSI TARIK DATA CLOUD YANG HILANG
       ======================================================== */
    async function tarikDataCloud() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        if(!t) return;
        
        let yL = document.getElementById('thnLalu').value;
        let mL = document.getElementById('blnLalu').value;
        let yK = document.getElementById('thnKini').value;
        let mK = document.getElementById('blnKini').value;

        try {
            // Memanggil Apps Script dengan parameter GET untuk menarik data toko tertentu
            let response = await fetch(`${scriptURL}?action=get&toko=${t}`);
            let cloudData = await response.json();
            
            if (cloudData && cloudData.status === "success" && cloudData.data) {
                // Integrasikan data dari cloud ke local database (db)
                if(!db[t]) db[t] = {};
                if(!db[t][yL]) db[t][yL] = {}; if(!db[t][yL][mL]) db[t][yL][mL] = {totalLalu:0,harianLalu:{}};
                if(!db[t][yK]) db[t][yK] = {}; if(!db[t][yK][mK]) db[t][yK][mK] = {target:0,harianKini:{}};

                // Overwrite atau gabungkan jika data dari cloud tersedia
                if(cloudData.data.totalLalu) db[t][yL][mL].totalLalu = cloudData.data.totalLalu;
                if(cloudData.data.target) db[t][yK][mK].target = cloudData.data.target;
                if(cloudData.data.harianLalu) db[t][yL][mL].harianLalu = Object.assign(db[t][yL][mL].harianLalu, cloudData.data.harianLalu);
                if(cloudData.data.harianKini) db[t][yK][mK].harianKini = Object.assign(db[t][yK][mK].harianKini, cloudData.data.harianKini);
                
                // Simpan hasil sinkronisasi ke localStorage & Render Ulang visualnya
                localStorage.setItem('alfaSalesPaten_v10', JSON.stringify(db));
                
                // Update kembali nilai input form di layar agar sinkron dengan data cloud terbaru
                document.getElementById('totalLalu').value = db[t][yL][mL].totalLalu || "";
                document.getElementById('targetKini').value = db[t][yK][mK].target || "";
                
                renderAll();
                console.log("☁️ Sinkronisasi Cloud sukses!");
            }
        } catch (e) {
            console.warn("⚠️ Gagal sinkronisasi data dari Cloud. Menggunakan data offline HP.", e);
        }
    }

    function updateShiftVisibility() {
        const tipe = document.getElementById('tipeToko').value;
        const s3 = document.getElementById('s3');
        if(tipe === 'non24') {
            s3.style.display = 'none';
            s3.value = 0; 
        } else {
            s3.style.display = 'block';
        }
    }

    document.getElementById('tipeToko').addEventListener('change', updateShiftVisibility);

    async function simpanLalu() {
    const btn = document.querySelector(".btn-blue");
    const originalText = btn.innerText;

    let t = document.getElementById('kodeToko').value.toUpperCase();
    let tgl = document.getElementById('tglHistori').value;
    let val = parseFloat(document.getElementById('valHistori').value) || 0;
    let totalL = parseFloat(document.getElementById('totalLalu').value) || 0;
    let yL = document.getElementById('thnLalu').value;
    let mL = document.getElementById('blnLalu').value;

    if (!t || !tgl || !val || !totalL) return alert("⚠️ Data Acuan Belum Lengkap!");

    // LOCK TOMBOL (Anti Double Input)
    btn.disabled = true;
    btn.innerText = "⌛ Proses Simpan...";

    if(!db[t]) db[t]={};
    if(!db[t][yL]) db[t][yL]={};
    if(!db[t][yL][mL]) db[t][yL][mL]={totalLalu:0, harianLalu:{}};
    
    db[t][yL][mL].harianLalu[tgl] = val;
    db[t][yL][mL].totalLalu = totalL;
    save();

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "save",
                toko: t,
                type: "LALU",
                key: tgl,
                payload: { val: val, totalLalu: totalL }
            })
        });
        alert("✅ DATA ACUAN MASUK KE DRIVE!");
    } catch (e) {
        alert("⚠️ Gagal ke Drive, tersimpan lokal.");
    } finally {
        btn.disabled = false;
        btn.innerText = originalText;
    }
}

    async function simpanKini() {
    const btn = document.getElementById('btnSave'); 
    btn.disabled = true; // MATIKAN TOMBOL AGAR TIDAK DOBEL INPUT
    btn.innerText = "⌛ Mengirim..."; 

    let t = document.getElementById('kodeToko').value.toUpperCase();
    let tgl = document.getElementById('inTgl').value;
    let s1 = parseFloat(document.getElementById('s1').value) || 0;
    let s2 = parseFloat(document.getElementById('s2').value) || 0;
    let s3 = parseFloat(document.getElementById('s3').value) || 0;
    let target = parseFloat(document.getElementById('targetKini').value) || 0;
    
    let payload = { s1, s2, s3, total: (s1 + s2 + s3) };
    let yK = document.getElementById('thnKini').value;
    let mK = document.getElementById('blnKini').value;

    if (!db[t]) db[t] = {};
    if (!db[t][yK]) db[t][yK] = {};
    if (!db[t][yK][mK]) db[t][yK][mK] = { target: 0, harianKini: {} };

    db[t][yK][mK].harianKini[tgl] = payload;
    db[t][yK][mK].target = target;
    
    if (!db[t][yK][mK].lastUpdate) db[t][yK][mK].lastUpdate = {};
    db[t][yK][mK].lastUpdate[tgl] = new Date().toISOString();
    
    save();

    // --- HITUNG GAP ULANG DISINI AGAR MASUK DRIVE ---
    let yL = document.getElementById('thnLalu').value;
    let mL = document.getElementById('blnLalu').value;
    let dL = db[t][yL]?.[mL] || { totalLalu: 0, harianLalu: {} };
    let accumGap = 0;
    for (let i = 1; i <= tgl; i++) {
        let vL = dL.harianLalu[i] || 0;
        let rK = db[t][yK][mK].harianKini[i] || { total: 0 };
        let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0;
        let tH = Math.round(pL * target);
        if (rK.total > 0) accumGap += (rK.total - tH);
    }
    // ----------------------------------------------

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "save",
                toko: t,
                type: "KINI",
                key: tgl,
                payload: payload,
                target: target,
                gap: accumGap // GAP DIKIRIM KE DRIVE
            })
        });
        alert("✅ DATA KINI & GAP MASUK KE DRIVE!");
    } catch (e) {
        alert("⚠️ Gagal ke Drive!");
    } finally {
        btn.disabled = false; // HIDUPKAN LAGI TOMBOLNYA
        btn.innerText = "UPDATE & SIMPAN";
        cekKunci();
    }
}

    function save() { localStorage.setItem('alfaSalesPaten_v10', JSON.stringify(db)); renderAll(); }

    function renderAll() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        let tb = document.querySelector("#mainTable tbody"); 
        tb.innerHTML = ""; 
        if (!t || !db[t]) return;

        let yL = document.getElementById('thnLalu').value, mL = document.getElementById('blnLalu').value, 
            yK = document.getElementById('thnKini').value, mK = document.getElementById('blnKini').value;
        let dL = db[t][yL][mL], dK = db[t][yK][mK];
        let ak = 0, tk = 0, ths = 0, rhs = 0, rS = {s1:0, s2:0, s3:0};
        
        let tglInputUser = parseInt(document.getElementById('inTgl').value) || tglSkrg;

        for (let i = 1; i <= 31; i++) {
            let vL = dL.harianLalu[i] || 0, rK = dK.harianKini[i] || {s1:0, s2:0, s3:0, total:0};
            let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0, tH = Math.round(pL * dK.target);
            let dtL = new Date(yL, mL - 1, i), dtK = new Date(yK, mK - 1, i); 
            if (dtK.getMonth() !== mK - 1) continue;

            let hL = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"][dtL.getDay()], 
                hK = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"][dtK.getDay()], 
                jK = [0, 5, 6].includes(dtK.getDay()), jL = [0, 5, 6].includes(dtL.getDay());

            ak += (rK.total > 0 ? (rK.total - tH) : 0); 
            tk += rK.total;
            
            if (i == tglInputUser) { ths = tH; rhs = rK.total; rS = rK; }

            tb.innerHTML += `<tr class="${jK ? 'jsm-row' : ''}">
                <td>${i}</td>
                <td>${hL} ${jL ? '<span class="tag-jsm-lalu">JSM</span>' : ''}</td>
                <td>${hK} ${jK ? '<span class="tag-jsm">JSM</span>' : ''}</td>
                <td>${vL.toLocaleString()}</td>
                <td class="kontribusi-col">${(pL * 100).toFixed(2)}%</td>
                <td style="color:#2980b9;font-weight:bold">${tH.toLocaleString()}</td>
                <td><span class="badge-s1">${rK.s1.toLocaleString()}</span> <span class="badge-s2">${rK.s2.toLocaleString()}</span> <span class="badge-s3">${rK.s3.toLocaleString()}</span></td>
                <td style="background:#e8f8f5;font-weight:bold">${rK.total.toLocaleString()}</td>
                <td style="color:${ak >= 0 ? 'green' : 'red'};font-weight:bold">${ak.toLocaleString()}</td>
            </tr>`;
        }

        let aB = dK.target > 0 ? ((tk / dK.target) * 100).toFixed(2) : 0, 
            aH = ths > 0 ? ((rhs / ths) * 100).toFixed(2) : 0;
        let sisaTarget = dK.target - tk;
        let sisaText = sisaTarget > 0 ? `Sisa: Rp ${sisaTarget.toLocaleString()}` : "🔥 TARGET TEMBUS!";
        let dashColor = ak >= 0 ? '#27ae60' : '#e74c3c';

        document.getElementById('summaryDashboard').innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom:10px;">
                <svg width="60" height="60" viewBox="0 0 36 36">
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#eee" stroke-width="3"/>
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${dashColor}" stroke-width="3" stroke-dasharray="${Math.min(aB, 100)}, 100" stroke-linecap="round"/>
                    <text x="18" y="21" text-anchor="middle" font-size="8" font-weight="bold" fill="#333">${aB}%</text>
                </svg>
                <div>
                    <div style="font-size:12px; color:${dashColor}; font-weight:900;">${ak >= 0 ? '📈 NABUNG' : '📉 HUTANG'}</div>
                    <div style="font-size:11px; font-weight:bold;">Rp ${Math.abs(ak).toLocaleString()}</div>
                    <div style="font-size:9px; color:#7f8c8d;">${sisaText}</div>
                </div>
            </div>
            <div class="progress-container" style="height:20px; border-radius:10px; position:relative; overflow:hidden; border:1px solid #ccc; background:#eee;">
                <div class="progress-text" style="position:absolute; width:100%; text-align:center; font-size:10px; font-weight:bold; line-height:20px; z-index:2;">Hari Ini (Tgl ${tglInputUser}): ${aH}%</div>
                <div class="progress-bar" style="width:${Math.min(aH, 100)}%; height:100%; background: linear-gradient(90deg, #f1c40f, ${aH>=100?'#2ecc71':'#e67e22'}); z-index:1;"></div>
            </div>`;

        let maxS = Math.max(rS.s1, rS.s2, rS.s3, 1);
        let tipe = document.getElementById('tipeToko').value;

        document.getElementById('shiftVisual').innerHTML = `
            <div style="font-size:11px; font-weight:bold; margin: 15px 0 10px 0; border-top: 1px solid #eee; padding-top: 10px; color:#2c3e50;">
                📊 PROGRESS PER SHIFT (TGL ${tglInputUser}):
            </div>
            <div style="margin-bottom: 8px;">
                <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:2px;">
                    <span>SHIFT 1 (Pagi)</span>
                    <span style="font-weight:bold;">Rp ${rS.s1.toLocaleString()}</span>
                </div>
                <div style="background:#f0f0f0; height:10px; border-radius:5px; overflow:hidden;">
                    <div style="width:${(rS.s1/maxS)*100}%; height:100%; background:#e67e22; border-radius:5px;"></div>
                </div>
            </div>
            <div style="margin-bottom: 8px;">
                <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:2px;">
                    <span>SHIFT 2 (Siang)</span>
                    <span style="font-weight:bold;">Rp ${rS.s2.toLocaleString()}</span>
                </div>
                <div style="background:#f0f0f0; height:10px; border-radius:5px; overflow:hidden;">
                    <div style="width:${(rS.s2/maxS)*100}%; height:100%; background:#9b59b6; border-radius:5px;"></div>
                </div>
            </div>
            <div id="visS3" style="margin-bottom: 8px; display:${tipe === '24jam' ? 'block' : 'none'};">
                <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:2px;">
                    <span>SHIFT 3 (Malam)</span>
                    <span style="font-weight:bold;">Rp ${rS.s3.toLocaleString()}</span>
                </div>
                <div style="background:#f0f0f0; height:10px; border-radius:5px; overflow:hidden;">
                    <div style="width:${(rS.s3/maxS)*100}%; height:100%; background:#2c3e50; border-radius:5px;"></div>
                </div>
            </div>
        `;
        
        document.getElementById('quoteDisplay').innerText = qList[Math.floor(Math.random() * qList.length)];
    }

    function kirimWA() {
        let t = document.getElementById('kodeToko').value.toUpperCase();
        let tgl = document.getElementById('inTgl').value;
        let tipe = document.getElementById('tipeToko').value;
        let yL = document.getElementById('thnLalu').value, mL = document.getElementById('blnLalu').value;
        let yK = document.getElementById('thnKini').value, mK = document.getElementById('blnKini').value;
        
        let dK = db[t][yK][mK];
        let d = dK.harianKini[tgl];
        let dL = db[t][yL][mL];

        if (!d) return alert("Input data dulu untuk tanggal ini!");

        let vL = dL.harianLalu[tgl] || 0;
        let pL = dL.totalLalu > 0 ? (vL / dL.totalLalu) : 0;
        let tH = Math.round(pL * dK.target);
        let ach = tH > 0 ? ((d.total / tH) * 100).toFixed(1) : 0;
        
        let hNama = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        let hariLalu = hNama[new Date(yL, mL - 1, tgl).getDay()];
        let hariKini = hNama[new Date(yK, mK - 1, tgl).getDay()];

        let bS1 = tH - d.s3; 
        let bS2 = tH - (d.s3 + d.s1);

        let prog = Math.min(Math.floor(ach / 10), 10);
        let bar = (ach >= 100) ? "🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩" : "🟧".repeat(prog) + "⬜".repeat(10 - prog);

        let pesan = `*🚀 MONITORING SALES [${t}] 🚀*\n` +
                    `-------------------------------------------\n` +
                    `📅 *INFO KOMPARASI*\n` +
                    `• Hari Ini: ${hariKini} (${tgl}/${mK})\n` +
                    `• Bulan Lalu: ${hariLalu} (${tgl}/${mL})\n` +
                    `-------------------------------------------\n\n` +
                    `📊 *ANALISA TARGET*\n` +
                    `• *Target Harian: Rp ${tH.toLocaleString()}*\n` +
                    `• Kontribusi: ${(pL * 100).toFixed(2)}%\n` +
                    `• Sales Bln Lalu: Rp ${vL.toLocaleString()}\n` +
                    `-------------------------------------------\n\n` +
                    `💰 *REALISASI & BEBAN SHIFT*\n`;

        if(tipe === "24jam") {
            pesan += `🌚 *SHIFT 3 (00-08)*\n` +
                     `• Real: Rp ${d.s3.toLocaleString()}\n` +
                     `• *Beban S1:* Rp ${bS1 > 0 ? bS1.toLocaleString() : 'LUNAS ✅'}\n\n`;
        }

        pesan += `🔸 *SHIFT 1 (08-16)*\n` +
                 `• Real: Rp ${d.s1.toLocaleString()}\n` +
                 `• *Beban S2:* Rp ${bS2 > 0 ? bS2.toLocaleString() : 'LUNAS ✅'}\n\n` +
                 `🔹 *SHIFT 2 (16-24)*\n` +
                 `• Real: Rp ${d.s2.toLocaleString()}\n` +
                 `• *Sisa Target:* Rp ${ (tH - d.total) > 0 ? (tH - d.total).toLocaleString() : 'LUNAS ✅'}\n` +
                 `-------------------------------------------\n\n` +
                 `🏆 *HASIL AKHIR TOKO*\n` +
                 `• *TOTAL REAL:* Rp ${d.total.toLocaleString()}\n` +
                 `• *ACHIEVEMENT:* ${ach}%\n` +
                 `${bar}\n` +
                 `-------------------------------------------\n` +
                 `${d.total >= tH ? '🟢 *TARGET JEBOL!* 💪' : '🔴 *KURANG Rp ' + (tH - d.total).toLocaleString() + '*' }\n\n` +
                 `*#omkopipait*`;

        window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    setInterval(() => { let d = new Date(); document.getElementById('liveClock').innerText = d.toLocaleString('id-ID'); }, 1000);
    
  function resetDb() {
    if (confirm("🚨 RESET TOTAL SEKARANG?\n\nJika Drive sudah kosong, maka setelah ini web akan bersih total 100%.\nSemua tabel dan dashboard akan kembali ke NOL.")) {
        
        // 1. HAPUS SEMUA STORAGE (Tanpa kecuali)
        localStorage.clear();
        sessionStorage.clear();
        
        // 2. PAKSA VARIABEL DB JADI KOSONG TOTAL
        // Kita hancurkan variabelnya di memori RAM
        window.db = {}; 
        db = {};

        // 3. KOSONGKAN TAMPILAN TABEL SECARA PAKSA (Hard Clear)
        const tabelBody = document.querySelector("#mainTable tbody");
        if (tabelBody) tabelBody.innerHTML = "<tr><td colspan='9'>Data telah dibersihkan...</td></tr>";

        // 4. KOSONGKAN INPUT MANUAL
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('summaryDashboard').innerHTML = "";
        document.getElementById('shiftVisual').innerHTML = "";

        // 5. JURUS PAMUNGKAS: REFRESH KERAS (Hard Reload)
        alert("✅ SEMUA JEJAK DIHAPUS!\nWeb akan memuat ulang ke halaman login.");
        
        // Memaksa browser membuang cache halaman ini
        window.location.replace("index.html");
    }
}
