<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Area Omkopipait</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 30px 15px; color: white; overflow-x: hidden; }
        
        .menu-box { background: rgba(0,0,0,0.85); padding: 30px 20px; border-radius: 25px; border: 2px solid #f39c12; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: auto; transition: all 0.4s ease-in-out; }
        
        #clock-container { margin-bottom: 20px; padding: 15px; background: rgba(243,156,18,0.1); border-radius: 15px; border: 1px solid rgba(243,156,18,0.3); }
        #jam { font-size: 36px; font-weight: bold; color: #f39c12; display: block; }
        #tanggal { font-size: 14px; color: #ecf0f1; margin-top: 5px; display: block; }
        .motivation { font-size: 14px; color: #ffeb3b; margin: 20px 0; font-style: italic; font-weight: bold; }
        
        .btn-menu { display: block; padding: 16px; margin: 12px 0; text-decoration: none; border-radius: 50px; font-weight: bold; color: white; font-size: 16px; text-transform: uppercase; transition: all 0.3s ease; }
        .btn-pps { background: linear-gradient(45deg, #8e44ad, #9b59b6); border-bottom: 4px solid #5e2d72; }
        .btn-sales { background: linear-gradient(45deg, #2980b9, #3498db); border-bottom: 4px solid #1c5a85; }
        .btn-menu:active { transform: translateY(2px); border-bottom: 0; }
        
        .copyright { font-size: 11px; margin-top: 25px; color: #bdc3c7; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .input-login { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; outline:none; font-size:16px; background: white; color: black; }
        .btn-masuk { width:100%; padding:15px; background:#f39c12; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; text-transform: uppercase; transition: 0.3s; }
        .btn-masuk:active { transform: scale(0.98); }
        .text-link { color: #f39c12; font-size: 13px; text-decoration: none; display: inline-block; cursor: pointer; transition: 0.3s; }
        .text-link:hover { color: #fff; text-decoration: underline; }
        
        .password-container { position: relative; width: 100%; margin: 8px 0; }
        .password-container input { margin: 0; padding-right: 45px; }
        .toggle-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none; filter: grayscale(100%); }

        /* CSS LAYAR LOADING */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 60px; height: 60px; border: 5px solid rgba(243,156,18,0.2);
            border-top: 5px solid #f39c12; border-radius: 50%;
            animation: puter 1s linear infinite; margin-bottom: 25px;
        }
        @keyframes puter { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text {
            font-size: 16px; font-weight: bold; color: #f39c12; font-style: italic; 
            text-align: center; max-width: 80%; line-height: 1.5;
        }
        
        /* CSS MODAL POPUP MUSIK KOPIPAIT */
        #music-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92); z-index: 9998;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .music-modal-box {
            background: #111; border: 2px solid #f39c12; border-radius: 20px; 
            padding: 30px 20px; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* -------------------------------------------------------------
           CSS MODE LAPORAN - KUNCI AGAR TIDAK GEPENG
           ------------------------------------------------------------- */
        .menu-box.mode-laporan {
            max-width: 98vw !important; /* Supaya melebar mentok di layar laptop */
            height: 96vh !important;    /* Tinggi otomatis mengambil 96% layar */
            padding: 15px !important;
            display: flex !important;
            flex-direction: column !important;
        }

        /* Memaksa kontainer menu & iframe untuk memanjang ke bawah (flex-grow: 1) */
        .menu-box.mode-laporan #menu-ui,
        .menu-box.mode-laporan #wadah-laporan {
            display: flex !important;
            flex-direction: column !important;
            flex-grow: 1 !important;
            height: 100% !important;
        }

        .menu-box.mode-laporan #wadah-iframe {
            flex-grow: 1 !important;
            height: 100% !important;
            min-height: 400px; /* Batas aman supaya tidak gepeng di browser aneh */
        }

        /* Khusus Layar Sempit (HP) agar Layar Penuh 100% */
        @media (max-width: 768px) {
            .menu-box.mode-laporan {
                max-width: 100vw !important;
                height: 100vh !important;
                border-radius: 0 !important;
                border: none !important;
                padding: 10px !important;
                margin: 0 !important;
            }
            body.mode-laporan-aktif {
                padding: 0 !important;
                overflow: hidden !important; 
            }
        }
    </style>
</head>
<body>

    <!-- SISTEM AUDIO MP3 (Pastikan file source.mp3 di-upload se-folder ya) -->
    <audio id="bgAudio" loop preload="auto">
        <source src="source.mp3" type="audio/mpeg">
    </audio>

    <!-- LAYAR LOADING -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Tunggu sebentar...</div>
    </div>

    <!-- POP-UP NOTIFIKASI MUSIK & KOPIPAIT -->
    <div id="music-modal">
        <div class="music-modal-box">
            <div style="font-size:40px; margin-bottom:10px;">☕🎶</div>
            <h3 style="color:#f39c12; margin:0 0 15px 0; font-size:20px;">Waktunya Laporan!</h3>
            <p id="music-quote" style="color:#ecf0f1; font-size:14px; line-height:1.6; font-style:italic; margin-bottom:25px;"></p>
            <button onclick="startMusicAndCloseModal()" class="btn-masuk" style="background:linear-gradient(45deg, #27ae60, #2ecc71); margin-top:0; margin-bottom:12px;">🎵 PUTAR MUSIK SEKARANG</button>
        </div>
    </div>

    <div class="menu-box" id="main-box">
        <div id="clock-container">
            <span id="jam">00:00:00</span>
            <span id="tanggal">Memuat Tanggal...</span>
        </div>

        <div id="auth-ui"></div>
        <div id="menu-ui" style="display:none;"></div>

        <div class="motivation" id="teks-motivasi">"Target hanyalah angka.<br>Tetapi harus tetap dikejar."</div>
        
        <div class="copyright" id="footer-copy">
            Copyright &copy; 2026 <b>Omkopipait</b><br>
            "Semua dibikin pake IA. Mending scrol Facebook & Tiktok."
        </div>
    </div>

    <script>
        const urlAppsScript = "https://script.google.com/macros/s/AKfycbwvWbek3tcsEyoh_aS6HpTXoq44_G-vpoVszOkD9om7CI3684vLfuWz5SLyu_7zRAb4/exec";

        let loadingTimer;
        const kataMotivasi = [
            "Tetap semangat... 💪", 
            "Jangan lupa berdoa... 🤲", 
            "Jangan lupa sholat... 🕌", 
            "Jangan lupa makan... 🍛"
        ];
        
        const kopipaitQuotes = [
            "Sebelum mulai laporan, yuk klik putar musiknya biar tambah semangat! Jangan lupa siapin segelas kopipaitnya! ☕",
            "Laporan numpuk? Tenang... Play musiknya dulu, tarik napas, dan nikmati kopipaitmu hari ini! 🎵☕",
            "Biar narik datanya makin syahdu, dengerin musik dulu yuk! Siapin mental dan sebatang inspirasi plus kopipait! 🚀☕",
            "Kerja keras boleh, tapi jangan lupa rileks. Klik putar musik, seruput kopipait, dan hajar laporan shift ini! 🔥☕",
            "Hari baru, semangat baru! Jangan biarkan sistem loading bikin suntuk. Putar lagunya, temani dengan secangkir kopipait! ☕🎶",
            "Target emang harus dikejar, tapi kewarasan juga harus dijaga. Putar musiknya, sruput kopipaitnya, gass laporannya! ☕🎧"
        ];
        
        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
            let index = 0;
            document.getElementById('loading-text').innerText = kataMotivasi[index];
            loadingTimer = setInterval(() => {
                index++;
                if (index >= kataMotivasi.length) index = 0;
                document.getElementById('loading-text').innerText = kataMotivasi[index];
            }, 1500);
        }

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
            clearInterval(loadingTimer);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('jam').textContent = now.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('tanggal').textContent = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }
        setInterval(updateClock, 1000); updateClock();

        function showMusicPrompt() {
            if(!sessionStorage.getItem('musicPromptShown')) {
                const randQuote = kopipaitQuotes[Math.floor(Math.random() * kopipaitQuotes.length)];
                document.getElementById('music-quote').innerText = `"${randQuote}"`;
                document.getElementById('music-modal').style.display = 'flex';
            }
        }

        function startMusicAndCloseModal() {
            const music = document.getElementById('bgAudio');
            music.volume = 0.8;
            music.play().catch(e => console.log("Gagal muter musik, pastikan file source.mp3 ada!"));
            
            document.getElementById('music-modal').style.display = 'none';
            sessionStorage.setItem('musicPromptShown', 'true');
        }

        function closeMusicModalOnly() {
            document.getElementById('music-modal').style.display = 'none';
            sessionStorage.setItem('musicPromptShown', 'true');
        }

        function init() {
            const user = JSON.parse(sessionStorage.getItem("userArea"));
            if (user && localStorage.getItem("lastLoginDate") === new Date().toDateString()) {
                showMenu(user);
            } else {
                showLogin();
            }
        }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text'; icon.innerText = '🙈'; 
            } else {
                input.type = 'password'; icon.innerText = '👁️'; 
            }
        }

        function showLogin() {
            const saved = JSON.parse(localStorage.getItem("permanentUser")) || {email:''};
            document.getElementById('auth-ui').innerHTML = `
                <h3 style="color:#f39c12; margin:0 0 10px 0; font-size:18px;">PORTAL AREA OMKOPIPAIT</h3>
                <input type="email" id="logEmail" value="${saved.email || ''}" placeholder="Alamat Email" class="input-login">
                <div class="password-container">
                    <input type="password" id="logPass" placeholder="Password" class="input-login">
                    <span class="toggle-eye" onclick="togglePassword('logPass', this)">👁️</span>
                </div>
                <button id="btnAction" onclick="doLogin()" class="btn-masuk">MASUK AREA</button>
                <div style="margin-top:15px; display:flex; justify-content:space-between; font-size:13px;">
                    <span class="text-link" onclick="showLupaPassword()">Lupa Password?</span>
                    <span class="text-link" onclick="showRegister()" style="color:#2ecc71;">Daftar Akun Baru</span>
                </div>
            `;
            document.getElementById('menu-ui').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('auth-ui').innerHTML = `
                <h3 style="color:#2ecc71; margin:0 0 10px 0; font-size:18px;">BUAT AKUN BARU</h3>
                <input type="text" id="regNama" placeholder="Nama Lengkap" class="input-login">
                <input type="text" id="regToko" placeholder="Kode Toko (Contoh: CB09)" class="input-login">
                <select id="regRole" class="input-login">
                    <option value="locked">Crew Store</option>
                    <option value="admin">Kepala Toko</option>
                </select>
                <input type="email" id="regEmail" placeholder="Alamat Email Aktif" class="input-login">
                <div class="password-container">
                    <input type="password" id="regPass" placeholder="Buat Password" class="input-login">
                    <span class="toggle-eye" onclick="togglePassword('regPass', this)">👁️</span>
                </div>
                <button id="btnReg" onclick="doRegister()" class="btn-masuk" style="background: linear-gradient(45deg, #27ae60, #2ecc71);">DAFTAR SEKARANG</button>
                <span class="text-link" onclick="showLogin()" style="display:block; text-align:center; margin-top:15px;">« Batal & Kembali ke Login</span>
            `;
        }

        function showLupaPassword() {
            document.getElementById('auth-ui').innerHTML = `
                <h3 style="color:#e74c3c; margin:0 0 10px 0; font-size:18px;">RESET PASSWORD</h3>
                <p style="font-size:12px; color:#bdc3c7; margin-bottom:15px;">Masukkan email. Kami akan mengirimkan <b>6 Angka Keamanan (OTP)</b> ke email Anda.</p>
                <input type="email" id="reqEmail" placeholder="Masukkan Email Terdaftar" class="input-login">
                <button id="btnReq" onclick="doRequestOTP()" class="btn-masuk" style="background: linear-gradient(45deg, #c0392b, #e74c3c);">KIRIM KODE KE EMAIL</button>
                <span class="text-link" onclick="showLogin()" style="display:block; text-align:center; margin-top:15px;">« Batal & Kembali ke Login</span>
            `;
        }

        function showBikinSandiBaru(email) {
            document.getElementById('auth-ui').innerHTML = `
                <h3 style="color:#3498db; margin:0 0 10px 0; font-size:18px;">BUAT SANDI BARU</h3>
                <p style="font-size:12px; color:#bdc3c7; margin-bottom:15px;">Cek Email Anda. Masukkan Kode Keamanan dan lengkapi data untuk membuat sandi baru.</p>
                
                <input type="email" id="updEmail" value="${email}" readonly class="input-login" style="background:#ecf0f1; color:#7f8c8d;">
                <input type="text" id="updToko" placeholder="Masukkan Kode Toko Anda" class="input-login">
                <input type="text" id="updOTP" placeholder="Masukkan 6 Angka dari Email" class="input-login" maxlength="6" style="text-align:center; font-weight:bold; letter-spacing:3px;">
                
                <div class="password-container">
                    <input type="password" id="updPass1" placeholder="Sandi Baru" class="input-login">
                    <span class="toggle-eye" onclick="togglePassword('updPass1', this)">👁️</span>
                </div>
                <div class="password-container">
                    <input type="password" id="updPass2" placeholder="Ulangi Sandi Baru" class="input-login">
                    <span class="toggle-eye" onclick="togglePassword('updPass2', this)">👁️</span>
                </div>
                
                <button id="btnUpd" onclick="doUpdatePassword()" class="btn-masuk" style="background: linear-gradient(45deg, #2980b9, #3498db);">SIMPAN SANDI BARU</button>
                <span class="text-link" onclick="showLogin()" style="display:block; text-align:center; margin-top:15px;">« Batal</span>
            `;
        }

        async function doRequestOTP() {
            const email = document.getElementById('reqEmail').value.trim().toLowerCase();
            const btn = document.getElementById('btnReq');
            if(!email) return alert("Masukkan alamat email Anda!");
            
            showLoading(); 
            btn.disabled = true;

            try {
                const urlFetch = `${urlAppsScript}?action=reset_req&email=${encodeURIComponent(email)}`;
                const response = await fetch(urlFetch);
                const hasilText = await response.text();
                
                hideLoading(); 
                
                if (hasilText.startsWith("SUKSES")) {
                    alert("✅ BERHASIL!\nKode Keamanan telah dikirim. Silakan cek Inbox/Spam email Anda.");
                    showBikinSandiBaru(email); 
                } else {
                    alert(hasilText.replace("GAGAL|", ""));
                    btn.disabled = false;
                }
            } catch (e) {
                hideLoading();
                alert("Gagal terhubung ke sistem. Cek koneksi internet Anda.");
                btn.disabled = false;
            }
        }

        async function doUpdatePassword() {
            const email = document.getElementById('updEmail').value.trim();
            const toko = document.getElementById('updToko').value.trim().toUpperCase();
            const otp = document.getElementById('updOTP').value.trim();
            const pass1 = document.getElementById('updPass1').value;
            const pass2 = document.getElementById('updPass2').value;
            const btn = document.getElementById('btnUpd');

            if(!toko || !otp || !pass1 || !pass2) return alert("Semua kolom wajib diisi!");
            if(pass1 !== pass2) return alert("Sandi Baru dan Ulangi Sandi tidak sama! Cek lagi.");
            
            showLoading();
            btn.disabled = true;

            try {
                const urlFetch = `${urlAppsScript}?action=update_pass&email=${encodeURIComponent(email)}&toko=${encodeURIComponent(toko)}&otp=${encodeURIComponent(otp)}&newpass=${encodeURIComponent(pass1)}`;
                const response = await fetch(urlFetch);
                const hasilText = await response.text();
                
                hideLoading();
                
                if (hasilText.startsWith("SUKSES")) {
                    localStorage.removeItem('lockout_' + email);
                    localStorage.removeItem('attempts_' + email);
                    
                    alert("✅ Ganti sandi sukses. Jangan lupa lagi. Coba dikopipaitin dulu ☕");
                    showLogin();
                } else {
                    alert(hasilText.replace("GAGAL|", ""));
                    btn.disabled = false;
                }
            } catch (e) {
                hideLoading();
                alert("Gagal koneksi ke database. Cek sinyal Anda.");
                btn.disabled = false;
            }
        }

        async function doRegister() {
            const nama = document.getElementById('regNama').value.trim();
            const toko = document.getElementById('regToko').value.trim().toUpperCase();
            const role = document.getElementById('regRole').value;
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;
            const btn = document.getElementById('btnReg');

            if(!nama || !toko || !email || !pass) return alert("Semua kolom wajib diisi!");
            
            showLoading();
            btn.disabled = true;

            try {
                const urlFetch = `${urlAppsScript}?action=register&nama=${encodeURIComponent(nama)}&toko=${encodeURIComponent(toko)}&role=${encodeURIComponent(role)}&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`;
                const response = await fetch(urlFetch);
                const hasilText = await response.text();
                
                hideLoading();
                
                if (hasilText.startsWith("SUKSES")) {
                    localStorage.removeItem('lockout_' + email);
                    localStorage.removeItem('attempts_' + email);
                    
                    alert("✅ Pendaftaran Berhasil!\nSilakan Login dengan Sandi yang barusan dibuat.");
                    showLogin();
                } else {
                    alert(hasilText.replace("GAGAL|", ""));
                    btn.disabled = false;
                }
            } catch (e) {
                hideLoading();
                alert("Gagal koneksi. Jaringan jelek atau kuota menipis.");
                btn.disabled = false;
            }
        }

        async function doLogin() {
            const email = document.getElementById('logEmail').value.trim().toLowerCase();
            const pass = document.getElementById('logPass').value;
            const btn = document.getElementById('btnAction');

            if(!email || !pass) return alert("Email dan Password tidak boleh kosong!");
            
            const lockoutKey = 'lockout_' + email;
            const attemptsKey = 'attempts_' + email;
            const lockoutUntil = localStorage.getItem(lockoutKey);

            if (lockoutUntil && Date.now() < parseInt(lockoutUntil)) {
                const sisaMenit = Math.ceil((parseInt(lockoutUntil) - Date.now()) / 60000);
                return alert(`🚫 AKUN DIBLOKIR SEMENTARA!\n\nAnda salah password 3x. Tunggu ${sisaMenit} menit lagi, atau gunakan Lupa Password.`);
            }

            if (lockoutUntil && Date.now() >= parseInt(lockoutUntil)) {
                localStorage.removeItem(lockoutKey); localStorage.removeItem(attemptsKey);
            }
            
            showLoading();
            btn.disabled = true;

            try {
                const urlFetch = `${urlAppsScript}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`;
                const response = await fetch(urlFetch);
                const hasilText = await response.text();
                
                hideLoading();
                
                if (hasilText.startsWith("SUKSES")) {
                    localStorage.removeItem(attemptsKey);
                    const data = hasilText.split("|");
                    const userObj = { nama: data[1], toko: data[2], role: data[3], email: email };
                    
                    sessionStorage.setItem("userArea", JSON.stringify(userObj));
                    localStorage.setItem("permanentUser", JSON.stringify({email: email}));
                    localStorage.setItem("lastLoginDate", new Date().toDateString());
                    
                    sessionStorage.removeItem('musicPromptShown');
                    
                    alert(`Selamat datang, ${userObj.nama}!\nLogin berhasil.`);
                    location.reload();
                } else if (hasilText.includes("Email atau Password salah")) {
                    let attempts = parseInt(localStorage.getItem(attemptsKey)) || 0;
                    attempts++;
                    if (attempts >= 3) {
                        const oneHour = Date.now() + (60 * 60 * 1000);
                        localStorage.setItem(lockoutKey, oneHour);
                        alert("🚫 TILANG SISTEM!\n\nAnda salah 3x. Akun diblokir selama 1 Jam biar fokus! 🤣\nReset password kalau buru-buru.");
                    } else {
                        alert(`❌ PASSWORD SALAH!\n\nSisa percobaan: ${3 - attempts}x lagi sebelum diblokir.`);
                        localStorage.setItem(attemptsKey, attempts);
                    }
                    btn.disabled = false;
                } else {
                    alert(hasilText.replace("GAGAL|", ""));
                    btn.disabled = false;
                }
            } catch (e) {
                hideLoading();
                alert("Gagal terhubung. Pastikan sinyal internet stabil.");
                btn.disabled = false;
            }
        }

        // FUNGSI MEMBUKA LAPORAN (BERSIH DENGAN CSS CLASS)
        function bukaLaporan(urlTarget) {
            // Sembunyikan pernak-pernik menu
            document.getElementById('header-profil').style.display = 'none';
            document.getElementById('menu-grid').style.display = 'none';
            document.getElementById('teks-motivasi').style.display = 'none';
            document.getElementById('footer-copy').style.display = 'none';
            document.getElementById('clock-container').style.display = 'none';
            
            // Tambahkan CSS class untuk merubah kotak jadi Full Screen
            document.getElementById('main-box').classList.add('mode-laporan');
            document.body.classList.add('mode-laporan-aktif');
            
            // Masukkan link laporan & tampilkan wadah
            document.getElementById('frame-laporan').src = urlTarget;
            
            // Ganti display ke flex agar div iframe merenggang ke bawah
            document.getElementById('wadah-laporan').style.display = 'flex';
        }

        // FUNGSI KEMBALI KE MENU (MENUTUP LAPORAN)
        function tutupLaporan() {
            // Sembunyikan & bersihkan iframe laporan
            document.getElementById('wadah-laporan').style.display = 'none';
            document.getElementById('frame-laporan').src = ''; 
            
            // Hapus CSS Class untuk mengembalikan kotak jadi kecil kembali
            document.getElementById('main-box').classList.remove('mode-laporan');
            document.body.classList.remove('mode-laporan-aktif');
            
            // Munculkan kembali pernak-pernik menu
            document.getElementById('header-profil').style.display = 'block';
            document.getElementById('menu-grid').style.display = 'grid';
